target: all
multitenancy_enabled: false

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb
    retention_period: 30d

ingester:
  ring:
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/alertmanager

memberlist:
  join_members: []

usage_stats:
  enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn
