services:
  grafana:
    image: grafana/grafana-oss:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    platform: linux/arm64
    user: "472"
    container_name: grafana
    restart: always
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.shiron.dev/
      - GF_INSTALL_PLUGINS=grafana-clock-panel, grafana-simple-json-datasource
      - GF_AUTH_GITHUB_CLIENT_ID={{ .grafana_github_app_client_id }}
      - GF_AUTH_GITHUB_CLIENT_SECRET={{ .grafana_github_app_client_secret }}
      - GF_SMTP_HOST={{ .grafana_smtp_host }}
      - GF_SMTP_PASSWORD={{ .grafana_smtp_password }}
    volumes:
      - "./grafana_storage:/var/lib/grafana"
      - "./grafana_conf:/etc/grafana/"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  tunnel:
    image: cloudflare/cloudflared:2026.6.0@sha256:ba461b8aa9c042156dbd39c38657fe7431bafa063220eab8d5330a523863da9f
    container_name: tunnel
    restart: always
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "{{ .cf_tunnel_token }}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # influxdb はメトリクス永続化を VictoriaMetrics に一本化したため退役した。
  # コンテナ定義のみ外し、データ (bind mount の ./influxdb_data / ./influxdb_config)
  # は据え置く。postSyncCommand の `docker compose up -d --remove-orphans` により
  # 既存コンテナはオーファンとして停止・削除される。
  # origin が消えるため、influxdb.shiron.dev の Cloudflare Tunnel ingress と
  # e2e probe 対象 (vmagent.yml の cloudflare_tunnel_e2e / access_block_e2e) も
  # 併せて撤去した (2xx probe が常時失敗し critical alert が発火するのを防ぐ)。

  victoriametrics:
    container_name: victoriametrics
    image: victoriametrics/victoria-metrics:v1.145.0@sha256:c014fb5a711d38cb24fd0673197592cd1394bb903dbb16aea565620c9c8a3d70
    ports:
      - "127.0.0.1:8428:8428"
    volumes:
      - ./vmdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ln | grep :8428 || ss -ln | grep :8428"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # vmauth は remote_write の書き込みパスのみを VictoriaMetrics へ転送する
  # リバースプロキシ。home-ep からの push (vm-write.shiron.dev) はこの vmauth を
  # 経由させ、/api/v1/write 以外 (query / admin API) には到達させない。
  # 認証は Cloudflare Access (専用 service token) が担い、vmauth はパス制限のみ。
  vmauth:
    container_name: vmauth
    image: victoriametrics/vmauth:v1.145.0@sha256:c816c52c4d9187566c3dc23298dbd7c273352bfbacc811c353ff6e7f41921e10
    ports:
      - "127.0.0.1:8427:8427"
    volumes:
      - "./vmauth.yml:/etc/vmauth/auth.yml:ro"
    command:
      - "--auth.config=/etc/vmauth/auth.yml"
      - "--httpListenAddr=:8427"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8427/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  # メトリクス収集は vmagent に一本化した (旧 prometheus を置換)。
  # vmagent はローカル exporter と e2e blackbox プローブをスクレイプし、
  # 同居の victoriametrics へ remote_write する。ローカル TSDB は持たず、
  # 永続化は VictoriaMetrics 側に集約される。
  vmagent:
    container_name: vmagent
    image: victoriametrics/vmagent:v1.145.0@sha256:71f19af5c80bec6ea955c171bab0aae01314a80016b3600412c2b4bbb8d95d70
    ports:
      - "127.0.0.1:8429:8429"
    volumes:
      - "./vmagent.yml:/etc/vmagent/scrape.yml:ro"
      - "./vmagent_data:/vmagent-remotewrite-data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--promscrape.config=/etc/vmagent/scrape.yml"
      - "--remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "--remoteWrite.tmpDataPath=/vmagent-remotewrite-data"
      # victoriametrics 断時にバッファが arm-srv のディスクを食い潰さないよう
      # 上限を設ける。超過分は古いものから破棄される。
      - "--remoteWrite.maxDiskUsagePerURL=1GB"
      - "--httpListenAddr=:8429"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8429/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  docker_compose_exporter:
    container_name: docker_compose_exporter
    image: python:3.14-alpine@sha256:5a824eb82cc75361f98611f3cfc5091ea33f10a6ccea4d4ebdabbc523b9a1614
    command: ["python", "/app/docker-compose-exporter.py"]
    restart: always
    volumes:
      - "./docker-compose-exporter.py:/app/docker-compose-exporter.py:ro"
      # kics-scan ignore-line
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9487/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  blackbox_exporter:
    container_name: blackbox_exporter
    image: prom/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
    user: "1003:1004"
    ports:
      - "127.0.0.1:9115:9115"
    volumes:
      - "./blackbox.yml:/config/blackbox.yml:ro"
    command:
      - "--config.file=/config/blackbox.yml"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9115/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.10.2@sha256:337ff1d356b68d39cef853e8c6345de11ce7556bb34cda8bd205bcf2ed30b565
    container_name: node_exporter
    command:
      - "--path.rootfs=/host"
    # kics-scan ignore-line
    network_mode: host
    restart: always
    volumes:
      # kics-scan ignore-line
      - "/:/host:ro,rslave,noexec,nosuid,nodev"
    ports:
      - "127.0.0.1:9100:9100"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # kics-scan ignore-line
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1@sha256:3cde6faf0791ebf7b41d6f8ae7145466fed712ea6f252c935294d2608b1af388
    container_name: cadvisor
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # kics-scan ignore-line
      - "/:/rootfs:ro"
      # kics-scan ignore-line
      - "/var/run:/var/run:ro"
      # kics-scan ignore-line
      - "/sys:/sys:ro"
      # kics-scan ignore-line
      - "/var/lib/docker/:/var/lib/docker:ro"
      # kics-scan ignore-line
      - "/dev/disk/:/dev/disk:ro"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # kics-scan ignore-line
    cap_add:
      - SYS_ADMIN
    # kics-scan ignore-line
    devices:
      - "/dev/kmsg"
    environment:
      - "GOGC=80"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  loki:
    container_name: loki
    image: grafana/loki:3.5.0@sha256:4c431d2e6b9b38718694b31c5d56be7c80dc69c513215fde1aeb5b02cd4e2665
    user: "10001"
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - "./loki.yml:/etc/loki/config.yml:ro"
      - "./loki_data:/loki"
    command:
      - "-config.file=/etc/loki/config.yml"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  promtail:
    container_name: promtail
    image: grafana/promtail:3.5.0@sha256:507dfecd2f0949475d071c124bea1c26fc4f8c1cff0372eee57478d5b1c5fbff
    volumes:
      - "./promtail.yml:/etc/promtail/config.yml:ro"
      # kics-scan ignore-line
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      # kics-scan ignore-line
      - "/var/log/journal:/var/log/journal:ro"
      # kics-scan ignore-line
      - "/run/log/journal:/run/log/journal:ro"
      # kics-scan ignore-line
      - "/etc/machine-id:/etc/machine-id:ro"
      - "./promtail_positions:/tmp/positions"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
