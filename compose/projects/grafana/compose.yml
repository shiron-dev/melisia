services:
  grafana:
    image: grafana/grafana-oss:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    platform: linux/arm64
    user: "472"
    container_name: grafana
    restart: always
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.shiron.dev/
      - GF_INSTALL_PLUGINS=grafana-clock-panel, grafana-simple-json-datasource
      - GF_AUTH_GITHUB_CLIENT_ID={{ .grafana_github_app_client_id }}
      - GF_AUTH_GITHUB_CLIENT_SECRET={{ .grafana_github_app_client_secret }}
      - GF_SMTP_HOST={{ .grafana_smtp_host }}
      - GF_SMTP_PASSWORD={{ .grafana_smtp_password }}
    volumes:
      - "./grafana_storage:/var/lib/grafana"
      - "./grafana_conf:/etc/grafana/"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  tunnel:
    image: cloudflare/cloudflared:2026.6.0@sha256:ba461b8aa9c042156dbd39c38657fe7431bafa063220eab8d5330a523863da9f
    container_name: tunnel
    restart: always
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "{{ .cf_tunnel_token }}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # influxdb はメトリクス永続化を Mimir に一本化したため退役した。
  # コンテナ定義のみ外し、データ (bind mount の ./influxdb_data / ./influxdb_config)
  # は据え置く。postSyncCommand の `docker compose up -d --remove-orphans` により
  # 既存コンテナはオーファンとして停止・削除される。
  # origin が消えるため、influxdb.shiron.dev の Cloudflare Tunnel ingress と
  # e2e probe 対象 (vmagent.yml の cloudflare_tunnel_e2e / access_block_e2e) も
  # 併せて撤去した (2xx probe が常時失敗し critical alert が発火するのを防ぐ)。

  mimir:
    container_name: mimir
    image: grafana/mimir:2.17.11@sha256:2837a5444db482b47bc9355440bddaf430e177114d4d21d6c85a0916c80d504c
    ports:
      - "127.0.0.1:9009:9009"
    volumes:
      - "./mimir.yml:/etc/mimir/mimir.yml:ro"
      - "./mimirdata:/data/mimir"
    command:
      - "--config.file=/etc/mimir/mimir.yml"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      # grafana/mimir はシェルも wget も含まない distroless イメージのため、
      # バイナリを直接実行する CMD 形式でバージョン確認のみ行う。
      # HTTP /ready の到達性は外部から別途確認すること。
      test: ["CMD", "/bin/mimir", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  # vmauth は vm-write.shiron.dev (Cloudflare Tunnel + Access) 経由で受けた
  # リクエストのうち、Mimir への /api/v1/push と Loki への /loki/api/v1/push
  # のみを転送するリバースプロキシ。それ以外のパスはルート無しで拒否される。
  vmauth:
    container_name: vmauth
    image: victoriametrics/vmauth:v1.145.0@sha256:c816c52c4d9187566c3dc23298dbd7c273352bfbacc811c353ff6e7f41921e10
    ports:
      - "127.0.0.1:8427:8427"
    volumes:
      - "./vmauth.yml:/etc/vmauth/auth.yml:ro"
    command:
      - "--auth.config=/etc/vmauth/auth.yml"
      - "--httpListenAddr=:8427"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8427/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  # メトリクス収集は vmagent に一本化した (旧 prometheus を置換)。
  # vmagent はローカル exporter と e2e blackbox プローブをスクレイプし、
  # 同居の mimir へ remote_write する。ローカル TSDB は持たず、
  # 永続化は Mimir 側に集約される。
  vmagent:
    container_name: vmagent
    image: victoriametrics/vmagent:v1.145.0@sha256:71f19af5c80bec6ea955c171bab0aae01314a80016b3600412c2b4bbb8d95d70
    ports:
      - "127.0.0.1:8429:8429"
    volumes:
      - "./vmagent.yml:/etc/vmagent/scrape.yml:ro"
      - "./vmagent_data:/vmagent-remotewrite-data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--promscrape.config=/etc/vmagent/scrape.yml"
      - "--remoteWrite.url=http://mimir:9009/api/v1/push"
      - "--remoteWrite.tmpDataPath=/vmagent-remotewrite-data"
      # mimir 断時にバッファが arm-srv のディスクを食い潰さないよう
      # 上限を設ける。超過分は古いものから破棄される。
      - "--remoteWrite.maxDiskUsagePerURL=1GB"
      - "--httpListenAddr=:8429"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8429/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  docker_compose_exporter:
    container_name: docker_compose_exporter
    image: python:3.14-alpine@sha256:5a824eb82cc75361f98611f3cfc5091ea33f10a6ccea4d4ebdabbc523b9a1614
    command: ["python", "/app/docker-compose-exporter.py"]
    restart: always
    volumes:
      - "./docker-compose-exporter.py:/app/docker-compose-exporter.py:ro"
      # kics-scan ignore-line
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9487/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  blackbox_exporter:
    container_name: blackbox_exporter
    image: prom/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
    user: "1003:1004"
    ports:
      - "127.0.0.1:9115:9115"
    volumes:
      - "./blackbox.yml:/config/blackbox.yml:ro"
    command:
      - "--config.file=/config/blackbox.yml"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9115/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.10.2@sha256:337ff1d356b68d39cef853e8c6345de11ce7556bb34cda8bd205bcf2ed30b565
    container_name: node_exporter
    command:
      - "--path.rootfs=/host"
    # kics-scan ignore-line
    network_mode: host
    restart: always
    volumes:
      # kics-scan ignore-line
      - "/:/host:ro,rslave,noexec,nosuid,nodev"
    ports:
      - "127.0.0.1:9100:9100"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # kics-scan ignore-line
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1@sha256:3cde6faf0791ebf7b41d6f8ae7145466fed712ea6f252c935294d2608b1af388
    container_name: cadvisor
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # kics-scan ignore-line
      - "/:/rootfs:ro"
      # kics-scan ignore-line
      - "/var/run:/var/run:ro"
      # kics-scan ignore-line
      - "/sys:/sys:ro"
      # kics-scan ignore-line
      - "/var/lib/docker/:/var/lib/docker:ro"
      # kics-scan ignore-line
      - "/dev/disk/:/dev/disk:ro"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # kics-scan ignore-line
    cap_add:
      - SYS_ADMIN
    # kics-scan ignore-line
    devices:
      - "/dev/kmsg"
    environment:
      - "GOGC=80"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  loki:
    container_name: loki
    image: grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    user: "10001"
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - "./loki.yml:/etc/loki/config.yml:ro"
      - "./loki_data:/loki"
    command:
      - "-config.file=/etc/loki/config.yml"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  # kics-scan ignore-line
  promtail:
    container_name: promtail
    image: grafana/promtail:3.6.11@sha256:a761cb834cfaeee29745440d4884d6748f0a08d8f68928db1d707018c1dcfbe9
    volumes:
      - "./promtail.yml:/etc/promtail/config.yml:ro"
      # kics-scan ignore-line
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      # kics-scan ignore-line
      - "/var/log/journal:/var/log/journal:ro"
      # kics-scan ignore-line
      - "/run/log/journal:/run/log/journal:ro"
      # kics-scan ignore-line
      - "/etc/machine-id:/etc/machine-id:ro"
      - "./promtail_positions:/tmp/positions"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
