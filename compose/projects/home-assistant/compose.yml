# whisper_data / piper_data は各 1 コンテナ専用の名前付きボリュームで共有していないが、
# KICS の "Shared Volumes Between Containers" は誤検知する。この query は ignore-line で
# 抑制できない (v2.1.20) ため、ファイル単位で無効化する。
# kics-scan disable=8c978947-0ff6-485c-b0c2-0bfca6026466
networks:
  home-automation:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-resource-profiles:
  homeassistant: &resource-homeassistant
    cpus: 2.0
    mem_limit: 2g
    mem_reservation: 512m
    memswap_limit: 2g
  tiny: &resource-tiny
    cpus: 0.5
    mem_limit: 256m
    mem_reservation: 64m
    memswap_limit: 256m
  small: &resource-small
    cpus: 0.5
    mem_limit: 512m
    mem_reservation: 128m
    memswap_limit: 512m
  medium: &resource-medium
    cpus: 1.0
    mem_limit: 512m
    mem_reservation: 128m
    memswap_limit: 512m
  esphome: &resource-esphome
    cpus: 2.0
    mem_limit: 1g
    mem_reservation: 256m
    memswap_limit: 1g
  stt: &resource-stt
    cpus: 2.0
    mem_limit: 2g
    mem_reservation: 256m
    memswap_limit: 2g

volumes:
  esphome_build_cache:
  whisper_data:
  piper_data:

services:
  homeassistant:
    <<: *resource-homeassistant
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:2026.5.4@sha256:ceb1202133a5a036e8b03e20a10eb113186cc2f871968323c6fc6c3fc4205716"
    networks:
      - home-automation
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "192.168.1.61:8123:8123"
    volumes:
      - ./config:/config:rw
      # kics-scan ignore-line
      - /etc/localtime:/etc/localtime:ro
      # Bluetooth は ESPHome Bluetooth プロキシ (m5stack-atom-s3-lite) に移行したため、
      # 本体 BlueZ への dbus アクセス (/run/dbus) は外す。Pi のオンボード BT (hci0) の
      # エラーログも止まる。再び本体 BT を使う場合は /run/dbus:/run/dbus:ro を戻す。
    restart: unless-stopped
    privileged: false
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # kics-scan ignore-line
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mosquitto:
    <<: *resource-tiny
    container_name: mosquitto
    image: eclipse-mosquitto:2.0.22@sha256:914f529386804c8278a4e581526b9be5e1604df44b30daabc70aa97dcefe5268
    user: "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto_passwd:/mosquitto/config/passwd:ro
      - ./mosquitto_data:/mosquitto/data:rw
      - ./mosquitto_log:/mosquitto/log:rw
    # 1884 は home-kiosk 等の外部クライアント向け認証付き LAN リスナー。
    # 全インターフェース公開は意図的なので kics の host-interface 警告を抑制する。
    # kics-scan ignore-line
    ports:
      - "127.0.0.1:1883:1883"
      - "1884:1884"
    networks:
      - home-automation
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  homeassistant-tunnel:
    <<: *resource-small
    container_name: homeassistant-tunnel
    image: cloudflare/cloudflared:2026.6.1@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "{{ .cf_tunnel_token }}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging: *default-logging
    networks:
      home-automation:
        ipv4_address: 172.19.0.250
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      homeassistant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  homeassistant-localhost-proxy:
    <<: *resource-tiny
    container_name: homeassistant-localhost-proxy
    image: python:3.14-alpine@sha256:5a824eb82cc75361f98611f3cfc5091ea33f10a6ccea4d4ebdabbc523b9a1614
    network_mode: service:homeassistant
    command:
      - python
      - -c
      - |
        import asyncio

        FORWARDS = (
            ("127.0.0.1", 1883, "mosquitto", 1883),
            ("127.0.0.1", 10400, "openwakeword", 10400),
            ("127.0.0.1", 10300, "whisper", 10300),
            ("127.0.0.1", 10200, "piper", 10200),
            ("127.0.0.1", 5580, "172.19.0.1", 5580),
        )

        async def pipe(reader, writer):
            try:
                while data := await reader.read(65536):
                    writer.write(data)
                    await writer.drain()
            finally:
                writer.close()

        async def handle(client_reader, client_writer, target_host, target_port):
            try:
                target_reader, target_writer = await asyncio.open_connection(target_host, target_port)
            except OSError:
                client_writer.close()
                return
            await asyncio.gather(
                pipe(client_reader, target_writer),
                pipe(target_reader, client_writer),
            )

        async def main():
            servers = []
            for listen_host, listen_port, target_host, target_port in FORWARDS:
                servers.append(await asyncio.start_server(
                    lambda reader, writer, h=target_host, p=target_port: handle(reader, writer, h, p),
                    listen_host,
                    listen_port,
                ))
            await asyncio.gather(*(server.serve_forever() for server in servers))

        asyncio.run(main())
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      homeassistant:
        condition: service_started
        # homeassistant が再生成されると netns が変わるため、proxy を自動で再起動して
        # 新しい netns に再アタッチさせる (restart 不可・recreate 必須問題の恒久対応)
        restart: true
      matter-server:
        condition: service_started
      mosquitto:
        condition: service_started
      openwakeword:
        condition: service_started
      whisper:
        condition: service_started
      piper:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import socket;
          socket.create_connection(("127.0.0.1", 1883), 3).close();
          socket.create_connection(("127.0.0.1", 10400), 3).close();
          socket.create_connection(("127.0.0.1", 10300), 3).close();
          socket.create_connection(("127.0.0.1", 10200), 3).close();
          socket.create_connection(("127.0.0.1", 5580), 3).close()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  esphome:
    <<: *resource-esphome
    container_name: esphome
    image: ghcr.io/esphome/esphome:2026.5.1@sha256:7886a4b0f04bd7d5e092e0b0cae277a47e39088d4d9028935df3304655300acd
    volumes:
      - ./esphome_config:/config:rw
      # kics-scan ignore-line
      - esphome_build_cache:/config/.esphome
      # kics-scan ignore-line
      - /etc/localtime:/etc/localtime:ro
    networks:
      - home-automation
    ports:
      - "127.0.0.1:6052:6052"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6052"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  openwakeword:
    <<: *resource-medium
    container_name: openwakeword
    image: rhasspy/wyoming-openwakeword:latest@sha256:52cb1168731a1849fc28cf339c935fde58746bbabc94226668a40ef6ddf5d42b
    command:
      - --uri
      - tcp://0.0.0.0:10400
      - --preload-model
      - ok_nabu
    networks:
      - home-automation
    ports:
      - "127.0.0.1:10400:10400"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >
          import socket;
          s = socket.create_connection(("127.0.0.1", 10400), 3);
          s.close()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Wyoming STT (faster-whisper)。Assist パイプラインの音声認識を担当。
  # 多言語 small モデルで日本語+英語を auto 検出。Pi では負荷が高いので
  # 軽くしたい場合は --model を base / tiny-int8 に下げる。
  whisper:
    <<: *resource-stt
    container_name: whisper
    image: rhasspy/wyoming-whisper:latest@sha256:9501d2659eee83b6eead98d53842193e5fed011eda6c5b1c3ad36f3146b28fed
    command:
      - --uri
      - tcp://0.0.0.0:10300
      - --model
      - small
      - --language
      - auto
      - --beam-size
      - "1"
      - --data-dir
      - /data
      - --download-dir
      - /data
    volumes:
      - whisper_data:/data
      # kics-scan ignore-line
      - /etc/localtime:/etc/localtime:ro
    networks:
      - home-automation
    ports:
      - "127.0.0.1:10300:10300"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >
          import socket;
          s = socket.create_connection(("127.0.0.1", 10300), 3);
          s.close()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.1'
          memory: 256M

  # Wyoming TTS (Piper)。Assist パイプラインの音声合成を担当。
  # 日本語の高品質 Piper ボイスは未提供のため、日本語応答は要検討
  # (README 参照)。英語は en_US-lessac-medium を使用。
  piper:
    <<: *resource-medium
    container_name: piper
    image: rhasspy/wyoming-piper:latest@sha256:c874e4a04657ae3381332ee5d0c8c70a310dae6722892840f530ac0890b44eb3
    command:
      - --uri
      - tcp://0.0.0.0:10200
      - --voice
      - en_US-lessac-medium
      - --data-dir
      - /data
      - --download-dir
      - /data
    volumes:
      - piper_data:/data
      # kics-scan ignore-line
      - /etc/localtime:/etc/localtime:ro
    networks:
      - home-automation
    ports:
      - "127.0.0.1:10200:10200"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >
          import socket;
          s = socket.create_connection(("127.0.0.1", 10200), 3);
          s.close()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  zigbee2mqtt:
    <<: *resource-medium
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt:2.12.0@sha256:1debff565ab6841417bd9f7ce8ad44f8c5f25a8b02a24ce3fd79e4779a4763a5
    user: "1000:1000"
    volumes:
      - ./zigbee2mqtt_data:/app/data:rw
      # kics-scan ignore-line
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://mosquitto
      - ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER=ember
      - ZIGBEE2MQTT_CONFIG_FRONTEND_PORT=8080
      - ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=true
    networks:
      - home-automation
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # node binary has cap_net_bind_service=ep file capability; bounding set must include it
    # or execve fails with EPERM. The capability is not actually used (port 8080 > 1024).
    # kics-scan ignore-line
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      - mosquitto
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  switchbot-mqtt:
    <<: *resource-medium
    container_name: switchbot-mqtt
    image: ghcr.io/hsakoh/switchbotmqtt-aarch64:latest@sha256:ff3d2652e7b5d59bc97ceab65b75e9fe4a0a00cc6684ed7896a2e63a6dc5d501
    volumes:
      - ./switchbot-mqtt:/data:rw
      # kics-scan ignore-line
      - /etc/localtime:/etc/localtime:ro
    environment:
      OVERRIDE_DATA_PATH: /data/
    networks:
      - home-automation
    ports:
      - "127.0.0.1:8098:8098"
      - "127.0.0.1:8099:8099"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-d", "/data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  matter-server:
    <<: *resource-medium
    container_name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:8.1@sha256:3a65f83161516c916566b13e65ce9e20a7a661e0784ab70e062a7423f416875b
    command: --primary-interface eth0 --storage-path /data
    # kics-scan ignore-line
    network_mode: host
    volumes:
      - ./matter_data:/data:rw
      # kics-scan ignore-line
      - /etc/localtime:/etc/localtime:ro
      # kics-scan ignore-line
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import socket;
          s = socket.create_connection(("127.0.0.1", 5580), 3);
          s.close()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
