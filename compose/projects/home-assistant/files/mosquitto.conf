per_listener_settings true
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Internal docker-network listener (HA, zigbee2mqtt, switchbot) — anonymous, not LAN-exposed
listener 1883
allow_anonymous true

# Authenticated LAN listener for external clients (e.g. home-kiosk)
listener 1884
allow_anonymous false
password_file /mosquitto/config/passwd
