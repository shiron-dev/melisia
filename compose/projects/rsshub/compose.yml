services:
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: unless-stopped
    # 既定ネットワーク (redis/tunnel との通信) に加え、同一ホストの FreshRSS が
    # Cloudflare Access を介さず http://rsshub:1200 で直接フィードを取得するための
    # 共有ネットワーク rss-internal に参加する。
    networks:
      - default
      - rss-internal
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      CACHE_EXPIRE: "{{ .rsshub_cache_expire }}"
      REDIS_URL: redis://rsshub-redis:6379
    depends_on:
      rsshub-redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:1200/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  rsshub-redis:
    image: redis:8.8.0-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    container_name: rsshub-redis
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ./redis_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  rsshub-tunnel:
    image: cloudflare/cloudflared:2026.6.1@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
    container_name: rsshub-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "{{ .cf_tunnel_token }}"
    depends_on:
      rsshub:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
  # FreshRSS との同一ホスト内通信用の共有ネットワーク。host.yml の
  # postSyncCommand が compose up 前に `docker network create rss-internal` で
  # 用意するため external として参照する (デプロイ順に依存しない)。
  rss-internal:
    external: true
    name: rss-internal
