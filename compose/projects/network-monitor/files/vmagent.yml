global:
  scrape_interval: 15s
  external_labels:
    probe_server: 'home-ep'
scrape_configs:
  - job_name: 'vmagent'
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['localhost:8429']
  - job_name: 'node'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - host.docker.internal:9100
        labels:
          host: home-ep
          probe_server: home-ep
      # TrueNAS (storage-srv) 上で TrueNAS Apps として常駐させた node_exporter。
      # アプリは apps プールに保存され TrueNAS アップデートを越えて生存するため、
      # 25.04+ で netdata から間引かれた host メトリクス (memory/cpu 等) を恒久的に
      # 取得できる。home-ep の vmagent が LAN 越しに 192.168.1.64:9100 を scrape する。
      - targets:
          - 192.168.1.64:9100
        labels:
          host: storage-srv
          probe_server: home-ep
  # home-ep 上の Docker Compose コンテナの状態を docker-compose-exporter から
  # 取得する。container/state/health/restart count を Prometheus 形式で公開する。
  - job_name: 'docker_compose'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - home_ep_docker_compose_exporter:9487
        labels:
          host: home-ep
  # 自前の icmp-ping-exporter が 10 分ごとに 5 発 ping を打って状態を保持する。
  # vmagent はその状態を 30s ごとに取りに行くだけ (実際の値は 10 分ごとに更新)。
  - job_name: 'home_ep_icmp'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - home_ep_icmp_ping_exporter:9799
        labels:
          probe_server: home-ep
          target_server: google-public-dns
          check: icmp
  - job_name: 'home_ep_cloudflare_speedtest'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - home_ep_cloudflare_speedtest_exporter:9798
        labels:
          probe_server: home-ep
          target_server: speed.cloudflare.com
  # TrueNAS SCALE (storage-srv) のメトリクス。TrueNAS の Reporting Exporter が
  # Graphite で push したものを graphite_exporter が Prometheus 形式へ変換して
  # 公開する。mapping が job/instance ラベルを付与する (job=truenas,
  # instance=TrueNAS ホスト名) ため honor_labels: true で exporter 側を優先する。
  - job_name: 'truenas'
    honor_labels: true
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - home_ep_truenas_graphite_exporter:9108
        labels:
          host: storage-srv
