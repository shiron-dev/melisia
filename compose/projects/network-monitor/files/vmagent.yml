global:
  scrape_interval: 15s
  external_labels:
    probe_server: 'home-ep'
scrape_configs:
  - job_name: 'vmagent'
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['localhost:8429']
  - job_name: 'home_ep_node'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - host.docker.internal:9100
        labels:
          probe_server: home-ep
  - job_name: 'home_ep_icmp'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /probe
    params:
      module: [icmp_8_8_8_8]
    static_configs:
      - targets:
          - 8.8.8.8
        labels:
          probe_server: home-ep
          target_server: google-public-dns
          check: icmp
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: home_ep_blackbox_exporter:9115
  - job_name: 'home_ep_cloudflare_speedtest'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - home_ep_cloudflare_speedtest_exporter:9798
        labels:
          probe_server: home-ep
          target_server: speed.cloudflare.com
