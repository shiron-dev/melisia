x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # 8.8.8.8 への到達性は blackbox の単発 ICMP では上流の断続ロスで probe_success
  # がバタつくため、1 サイクルで 5 発打って 1 発でも返れば成功とする自前 exporter
  # に置き換えた (= 10 分に 1 回・5 回リトライ)。loss 率/RTT も併せて出す。
  icmp_ping_exporter:
    container_name: home_ep_icmp_ping_exporter
    logging: *default-logging
    image: python:3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
    command: ["python", "/app/icmp-ping-exporter.py"]
    ports:
      - "127.0.0.1:9799:9799"
    networks:
      - home-automation
    # 調整値は icmp-ping.env に外出し (ソース・compose 定義を触らず設定変更可能)。
    env_file:
      - ./icmp-ping.env
    volumes:
      - "./icmp-ping-exporter.py:/app/icmp-ping-exporter.py:ro"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # ICMP echo の raw socket 用 (busybox ping)。
    # kics-scan ignore-line
    cap_add:
      - NET_RAW
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9799/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflare_speedtest_exporter:
    container_name: home_ep_cloudflare_speedtest_exporter
    logging: *default-logging
    image: python:3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
    command: ["python", "/app/cloudflare-speedtest-exporter.py"]
    ports:
      - "127.0.0.1:9798:9798"
    networks:
      - home-automation
    environment:
      CLOUDFLARE_SPEEDTEST_INTERVAL_SECONDS: "600"
      CLOUDFLARE_SPEEDTEST_DOWNLOAD_BYTES: "25000000"
      CLOUDFLARE_SPEEDTEST_UPLOAD_BYTES: "10000000"
      CLOUDFLARE_SPEEDTEST_TARGET_BASE_URL: "https://speed.cloudflare.com"
    volumes:
      - "./cloudflare-speedtest-exporter.py:/app/cloudflare-speedtest-exporter.py:ro"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9798/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # home-ep 上で稼働する Docker Compose コンテナの状態 (state/health/
  # restart count) を Docker API (docker.sock) から読み取って Prometheus 形式で
  # 公開する自前 exporter。vmagent が home-automation ネットワーク越しに
  # コンテナ名で 9487 をスクレイプする。
  docker_compose_exporter:
    container_name: home_ep_docker_compose_exporter
    logging: *default-logging
    image: python:3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
    command: ["python", "/app/docker-compose-exporter.py"]
    ports:
      - "127.0.0.1:9487:9487"
    networks:
      - home-automation
    volumes:
      - "./docker-compose-exporter.py:/app/docker-compose-exporter.py:ro"
      # kics-scan ignore-line
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9487/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # TrueNAS SCALE (storage-srv, LAN) の Reporting Exporter が Graphite 形式で push
  # するメトリクスを受け、Prometheus 形式に変換して :9108 で公開する。vmagent が
  # home-automation ネットワーク越しにコンテナ名で 9108 をスクレイプする。
  # graphite ingest (:9109) のみ home-ep の LAN-IP (192.168.1.61) に公開し、
  # TrueNAS から push させる (TrueNAS: Reporting → Exporters → Graphite,
  # 宛先 192.168.1.61:9109 / Prefix=truenas / Hostname=storage-srv)。
  # マッピング定義は Supporterino/truenas-graphite-to-prometheus を vendoring。
  truenas_graphite_exporter:
    container_name: home_ep_truenas_graphite_exporter
    logging: *default-logging
    image: prom/graphite-exporter:v0.16.0@sha256:e54bca6645ea8a9e8c52312a8540de98ad08819d38476c021d77a0eae75bc797
    command:
      - "--graphite.mapping-config=/etc/graphite_exporter/graphite_mapping.conf"
      - "--graphite.listen-address=:9109"
      - "--web.listen-address=:9108"
    ports:
      # TrueNAS からの Graphite push 受け口。home-ep の LAN インターフェース
      # (192.168.1.61) のみに bind し、Tailscale 等の他 IF には公開しない。
      - "192.168.1.61:9109:9109"
      # :9108 (Prometheus metrics) は publish せず、vmagent が docker network 内で
      # コンテナ名:9108 を直接 scrape する。
    networks:
      - home-automation
    volumes:
      - "./graphite_mapping.conf:/etc/graphite_exporter/graphite_mapping.conf:ro"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9108/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # home-ep のメトリクスは vmagent でローカルスクレイプし、arm-srv の
  # Mimir へ remote_write (push) する。書き込み経路は Cloudflare
  # Tunnel + Access (vm-write.shiron.dev) で、書き込み専用の vm_write service
  # token で認証する。
  # これにより各 exporter を外部公開してスクレイプさせる必要がなくなる。
  vmagent:
    container_name: home_ep_vmagent
    logging: *default-logging
    image: victoriametrics/vmagent:v1.145.0@sha256:71f19af5c80bec6ea955c171bab0aae01314a80016b3600412c2b4bbb8d95d70
    ports:
      - "127.0.0.1:8429:8429"
    networks:
      - home-automation
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./vmagent.yml:/etc/vmagent/scrape.yml:ro"
      - "./vmagent_data:/vmagent-remotewrite-data"
    command:
      - "--promscrape.config=/etc/vmagent/scrape.yml"
      - "--remoteWrite.url=https://vm-write.shiron.dev/api/v1/push"
      - "--remoteWrite.tmpDataPath=/vmagent-remotewrite-data"
      # 書き込み先 (vm-write/Access) 障害時にバッファが home-ep の
      # ディスクを食い潰さないよう上限を設ける。超過分は古いものから破棄される。
      - "--remoteWrite.maxDiskUsagePerURL=512MB"
      - "--remoteWrite.headers=CF-Access-Client-Id:{{ .cloudflare_vm_write_client_id }}^^CF-Access-Client-Secret:{{ .cloudflare_vm_write_client_secret }}"
      - "--httpListenAddr=:8429"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8429/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # home-ep のログは promtail でローカル収集し、arm-srv の Loki へ push する。
  # 書き込み経路は vmagent と同じ vm-write.shiron.dev (Cloudflare Tunnel + Access)。
  # vmauth が /loki/api/v1/push のみを Loki へ転送する。
  # kics-scan ignore-line
  promtail:
    container_name: home_ep_promtail
    logging: *default-logging
    image: grafana/promtail:3.6.11@sha256:a761cb834cfaeee29745440d4884d6748f0a08d8f68928db1d707018c1dcfbe9
    volumes:
      - "./promtail.yml:/etc/promtail/config.yml:ro"
      # kics-scan ignore-line
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      # kics-scan ignore-line
      - "/var/log/journal:/var/log/journal:ro"
      # kics-scan ignore-line
      - "/run/log/journal:/run/log/journal:ro"
      # kics-scan ignore-line
      - "/etc/machine-id:/etc/machine-id:ro"
      - "./promtail_positions:/tmp/positions"
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

networks:
  home-automation:
    external: true
    name: home-assistant_home-automation
