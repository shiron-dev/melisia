services:
  snipeit-db:
    image: mariadb:10.11@sha256:5a5c675881ef3fd1c1da9b0a3bfd6ee82edbe39cd9e32e06be18034c37235e0e
    container_name: snipeit-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "{{ .db_root_password }}"
      MARIADB_DATABASE: snipeit
      MARIADB_USER: snipeit
      MARIADB_PASSWORD: "{{ .db_password }}"
    user: "999:999"
    volumes:
      - ./db_data:/var/lib/mysql
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u \"$$MARIADB_USER\" --password=\"$$MARIADB_PASSWORD\" -e 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  snipeit-redis:
    image: redis:8.8.0-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    container_name: snipeit-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "{{ .redis_password }}"]
    user: "1000:1000"
    volumes:
      - ./redis_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "{{ .redis_password }}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  snipeit-app:
    image: snipe/snipe-it:v8.6.3@sha256:6476be7cca765880374a6d489d22ad43d3edba965ab3cb862bf828f5fc856e50
    container_name: snipeit-app
    restart: unless-stopped
    depends_on:
      snipeit-db:
        condition: service_healthy
      snipeit-redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "{{ .app_key }}"
      APP_URL: "https://snipeit.shiron.dev"
      APP_TIMEZONE: Asia/Tokyo
      APP_LOCALE: ja
      DB_CONNECTION: mysql
      DB_HOST: snipeit-db
      DB_DATABASE: snipeit
      DB_USERNAME: snipeit
      DB_PASSWORD: "{{ .db_password }}"
      DB_PORT: "3306"
      REDIS_HOST: snipeit-redis
      REDIS_PASSWORD: "{{ .redis_password }}"
      REDIS_PORT: "6379"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      TRUSTED_PROXIES: "*"
    volumes:
      - ./snipeit_data:/var/lib/snipeit
    # kics-scan ignore-line
    security_opt:
      - no-new-privileges:false
    cap_drop:
      - ALL
    # kics-scan ignore-line
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  snipeit-tunnel:
    image: cloudflare/cloudflared:2026.6.1@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
    container_name: snipeit-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "{{ .cf_tunnel_token }}"
    depends_on:
      snipeit-app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
