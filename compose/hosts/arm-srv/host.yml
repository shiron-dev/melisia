# yaml-language-server: $schema=../../../tools/cmt/schemas/host-config.schema.json

sshConfig: ../../ssh_config

projects:
  grafana:
    remotePath: /var
    composeAction: ignore
    postSyncCommand: chmod 0644 docker-compose-exporter.py vmagent.yml vmauth.yml mimir.yml loki.yml promtail.yml && docker compose up -d --remove-orphans && docker compose restart blackbox_exporter vmagent vmauth loki promtail
    dirs:
      - grafana_storage:
        owner: 472
        group: 472
        become: true
      - vmagent_data:
        owner: 0
        group: 0
        become: true
      # influxdb は停止済み (メトリクス永続化は Mimir に一本化)。
      # コンテナ定義は compose から外したが、過去データは据え置くため dir は残す。
      - influxdb_data:
        owner: 1000
        group: 1000
        become: true
      - influxdb_config:
        owner: 1000
        group: 1000
        become: true
      - mimirdata:
        owner: 0
        group: 0
        become: true
      - loki_data:
        owner: 10001
        group: 10001
        become: true
      - promtail_positions:
        owner: 0
        group: 0
        become: true

  n8n:
    remotePath: /var
    dirs:
      - n8n_data:
        owner: 1000
        group: 1000
        become: true
      - local-files:
        owner: 1000
        group: 1000
        become: true
      - rag:
        owner: 1000
        group: 1000
        become: true
      - postgres_data:
        owner: 1000
        group: 1000
        recursive: true
        become: true
      - redis_data:
        owner: 1000
        group: 1000
        recursive: true
        become: true

  portainer:
    remotePath: /var
    dirs:
      - portainer_data:
        owner: 0
        group: 0
        become: true

  discord-webhook:

  photoframe:

  snipeit:
    composeAction: down
    dirs:
      - db_data:
        owner: 999
        group: 999
        become: true
      - redis_data:
        owner: 1000
        group: 1000
        recursive: true
        become: true
      - snipeit_data:
        permission: "0775"
        become: true
