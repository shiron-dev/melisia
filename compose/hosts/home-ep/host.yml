# yaml-language-server: $schema=../../../tools/cmt/schemas/host-config.schema.json

sshConfig: ssh_config

projects:
  home-assistant:
    postSyncCommand: sudo chown -R shiron:shiron config && sudo find config -type d -exec chmod 0755 {} + && sudo find config -type f -exec chmod 0644 {} + && sudo chmod 0644 mosquitto.conf config/themes/default.yaml
    preserveRemoteFiles:
      - config/automations.yaml
      - config/scripts.yaml
      - config/scenes.yaml
    dirs:
      - config:
        permission: "0755"
        owner: shiron
        recursive: true
        become: true
      - config/custom_components:
        permission: "0755"
        owner: shiron
        recursive: true
        become: true
      - mosquitto_data:
        owner: 1883
        group: 1883
        become: true
      - mosquitto_log:
        owner: 1883
        group: 1883
        become: true
      - zigbee2mqtt_data:
        owner: 1000
        group: 1000
        become: true
      - matter_data:
        permission: "0777"
        owner: ansible_user
        become: true
      - switchbot-mqtt:
        permission: "0777"
        owner: ansible_user
        become: true
      - esphome_config:
        permission: "0777"
        owner: ansible_user
        become: true
