# yaml-language-server: $schema=../../../tools/cmt/schemas/host-config.schema.json

sshConfig: ssh_config

projects:
  home-assistant:
    postSyncCommand: sudo chown -R shiron:root config switchbot-mqtt esphome_config matter_data && sudo find config switchbot-mqtt esphome_config matter_data -type d -exec chmod 0770 {} + && sudo find config switchbot-mqtt esphome_config matter_data -type f -exec chmod 0660 {} + && sudo chmod 0644 mosquitto.conf
    preserveRemoteFiles:
      - config/automations.yaml
      - config/scripts.yaml
      - config/scenes.yaml
    dirs:
      - config:
        permission: "0770"
        owner: shiron
        group: root
        recursive: true
        become: true
      - config/custom_components:
        permission: "0770"
        owner: shiron
        group: root
        recursive: true
        become: true
      - mosquitto_data:
        owner: 1883
        group: 1883
        recursive: true
        become: true
      - mosquitto_log:
        owner: 1883
        group: 1883
        recursive: true
        become: true
      - zigbee2mqtt_data:
        owner: 1000
        group: 1000
        become: true
      - matter_data:
        permission: "0770"
        owner: shiron
        group: root
        become: true
      - switchbot-mqtt:
        permission: "0770"
        owner: shiron
        group: root
        become: true
      - esphome_config:
        permission: "0770"
        owner: shiron
        group: root
        become: true
