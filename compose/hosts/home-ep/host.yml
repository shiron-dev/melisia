# yaml-language-server: $schema=../../../tools/cmt/schemas/host-config.schema.json

sshConfig: ssh_config

projects:
  host-monitor: {}

  # Falco (ランタイムセキュリティ監視)。home-ep の Raspberry Pi カーネルは
  # modern eBPF 非対応のため kmod ドライバを使う。カーネルモジュールはホスト側で
  # dkms によりビルド/ロードし (ansible raspberrypi ロールの falco_driver タスク)、
  # コンテナはロード済みモジュールを使う。arm-srv は modern eBPF 版 (falco)。
  # 詳細は compose/projects/falco-kmod/README.md。
  # cmt がアップロードする設定ファイルは 0600 になるため 0644 に直す。
  falco-kmod:
    postSyncCommand: chmod 0644 falco.yaml falco_rules.local.yaml

  network-monitor:
    removeOrphans: true
    postSyncCommand: chmod 0644 icmp-ping-exporter.py cloudflare-speedtest-exporter.py docker-compose-exporter.py vmagent.yml promtail.yml graphite_mapping.conf
    dirs:
      # vmagent の remote_write オンディスクバッファ (arm-srv VM 断時の取りこぼし防止)
      - vmagent_data:
        owner: 0
        group: 0
        become: true
      - promtail_positions:
        owner: 0
        group: 0
        become: true

  home-assistant:
    postSyncCommand: >-
      sudo chown -R shiron:root config switchbot-mqtt esphome_config matter_data &&
      sudo find config switchbot-mqtt esphome_config matter_data -type d -exec chmod 0770 {} + &&
      sudo find config switchbot-mqtt esphome_config matter_data -type f -exec chmod 0660 {} + &&
      sudo chown -R 1883:1883 mosquitto_data mosquitto_log &&
      sudo find mosquitto_data mosquitto_log -type d -exec chmod 0770 {} + &&
      sudo find mosquitto_data mosquitto_log -type f -exec chmod 0660 {} + &&
      sudo chown -R 1000:1000 zigbee2mqtt_data &&
      sudo find zigbee2mqtt_data -type d -exec chmod 0770 {} + &&
      sudo find zigbee2mqtt_data -type f -exec chmod 0660 {} + &&
      sudo chmod 0644 mosquitto.conf
    # config/ (HA の Jinja2) と esphome_config/ (ESPHome の lambda / !secret) は
    # 本文が Go テンプレートのデリミタ {{ }} と衝突するため、変数展開をスキップして
    # 素のまま同期する。これにより automations.yaml 等を {{"{{"}} エスケープ無しで
    # repo 管理できる。switchbot-mqtt/options.json は {{ .switchbot_* }} 変数を使うため
    # 対象に含めない。
    templateIgnore:
      - config
      - esphome_config
    preserveRemoteFiles:
      # mosquitto の 1884 認証リスナー用パスワードファイル。`mosquitto_passwd` CLI で
      # リモート生成・管理しており、ハッシュ済み資格情報のため repo には置かない。
      - mosquitto_passwd
      # ESPHome の実シークレット (wifi_ssid / wifi_password)。資格情報のため repo に
      # 置かず、リモート (ESPHome ダッシュボードの Secrets エディタ) で管理する。
      # サンプルは repo の esphome_config/secrets.yaml.example を参照。
      - esphome_config/secrets.yaml
    dirs:
      - config:
        permission: "0770"
        owner: shiron
        group: root
        recursive: true
        become: true
      - config/custom_components:
        permission: "0770"
        owner: shiron
        group: root
        recursive: true
        become: true
      - mosquitto_data:
        permission: "0770"
        owner: 1883
        group: 1883
        recursive: true
        become: true
      - mosquitto_log:
        permission: "0770"
        owner: 1883
        group: 1883
        recursive: true
        become: true
      - zigbee2mqtt_data:
        permission: "0770"
        owner: 1000
        group: 1000
        recursive: true
        become: true
      - matter_data:
        permission: "0770"
        owner: shiron
        group: root
        become: true
      - switchbot-mqtt:
        permission: "0770"
        owner: shiron
        group: root
        become: true
      - esphome_config:
        permission: "0770"
        owner: shiron
        group: root
        become: true
