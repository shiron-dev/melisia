name: Setup Terraform from mise
description: Read the Terraform version from mise.toml and install Terraform
inputs:
  terraform-wrapper:
    description: Whether to install the Terraform wrapper script
    required: false
    default: "false"
outputs:
  version:
    description: The resolved Terraform version
    value: ${{ steps.terraform-version.outputs.version }}
runs:
  using: composite
  steps:
    - name: Get Terraform version from mise.toml
      id: terraform-version
      shell: bash
      run: |
        if grep -q 'terraform = "latest"' mise.toml; then
          echo "version=latest" >> "$GITHUB_OUTPUT"
        else
          version=$(grep 'terraform = ' mise.toml | sed 's/.*terraform = "\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
        fi
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ steps.terraform-version.outputs.version }}
        terraform_wrapper: ${{ inputs.terraform-wrapper }}
