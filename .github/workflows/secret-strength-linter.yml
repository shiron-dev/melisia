name: Secret Strength Linter

on:
  workflow_call:
    inputs:
      base_sha:
        required: true
        type: string
      head_sha:
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    env:
      GCP_SERVICE_ACCOUNT: github-actions-melisia@shiron-dev.iam.gserviceaccount.com
      GCP_WORKLOAD_IDENTITY_PROVIDER: projects/25543598735/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.base_sha }}
          path: .base-ref
      - name: Detect changed SOPS files
        id: detect
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --diff-filter=ACMR --name-only "${BASE_SHA}..${HEAD_SHA}" -- '*.secrets.*.sops' '*.secrets.sops.*')
          if [ -z "${CHANGED}" ]; then
            echo "No SOPS files changed, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "SOPS files changed:"
            echo "${CHANGED}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            {
              echo 'files<<EOF'
              echo "${CHANGED}"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Authenticate to GCP
        if: steps.detect.outputs.skip == 'false'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - uses: ./.github/actions/install-sops
        if: steps.detect.outputs.skip == 'false'
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        if: steps.detect.outputs.skip == 'false'
      - name: Run secret strength linter
        if: steps.detect.outputs.skip == 'false'
        env:
          SOPS_FILES: ${{ steps.detect.outputs.files }}
        run: |
          set -euo pipefail
          if [ ! -d ".base-ref/tools/secret-strength-linter" ]; then
            echo "Secret strength linter not found in base ref; skipping"
            exit 0
          fi
          mapfile -t files <<< "${SOPS_FILES}"
          uv run --project .base-ref/tools/secret-strength-linter \
            python .base-ref/tools/secret-strength-linter/check.py \
            "${files[@]}"
