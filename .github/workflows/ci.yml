name: Main CI

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}

jobs:
  all-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - go-version-sync-check
      - ansible-lint
      - check-symlinks
      # - dockerfile-lint
      - yaml-lint
      - compose-config-schema-check
      - markdown-lint
      - shell-lint
      - action-lint
      - dotenv-lint
      - kics
      - sops-secrets-check
      - renovate-deps-comment
      - gitleaks
      - trufflehog
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check all-status-check
        run: |
          diff \
            <(yq ".jobs | del(.all-status-check) | keys.[]" .github/workflows/ci.yml) \
            <(yq ".jobs.all-status-check.needs.[]" .github/workflows/ci.yml)
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done

  go-version-sync-check:
    name: Go version sync check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Compare all go.mod and mise.toml Go versions
        run: |
          set -euo pipefail

          mise_go_version="$(sed -nE 's/^go[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' mise.toml | head -n1)"

          if [[ -z "${mise_go_version}" ]]; then
            echo "Failed to read Go version from mise.toml"
            exit 1
          fi

          mismatch=0
          found=0

          while IFS= read -r go_mod_file; do
            found=1
            go_mod_version="$(awk '/^go / {print $2; exit}' "${go_mod_file}")"

            if [[ -z "${go_mod_version}" ]]; then
              echo "Failed to read Go version from ${go_mod_file}"
              mismatch=1
              continue
            fi

            if [[ "${go_mod_version}" != "${mise_go_version}" ]]; then
              echo "Go version mismatch detected:"
              echo "  file:      ${go_mod_file}"
              echo "  go.mod:    ${go_mod_version}"
              echo "  mise.toml: ${mise_go_version}"
              mismatch=1
            fi
          done < <(find . -type f -name "go.mod" | sort)

          if [[ "${found}" -eq 0 ]]; then
            echo "No go.mod files found"
            exit 1
          fi

          if [[ "${mismatch}" -ne 0 ]]; then
            exit 1
          fi

          echo "All go.mod files are in sync with mise.toml: ${mise_go_version}"

  ansible-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install ansible and ansible-lint
        run: uv sync --project tools/ansible
      - name: Run ansible-galaxy
        run: uv run --project tools/ansible -- bash -c "cd ansible && ansible-galaxy install -r requirements.yml"
      - name: Run ansible-lint
        run: uv run --project tools/ansible -- bash -c "cd ansible && ansible-lint"

  check-symlinks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Find symlinks
        run: |
          if [ -n "$(find . -type l)" ]; then
            echo "Error: Found symbolic links in the repository"
            find . -type l
            exit 1
          fi

  # dockerfile-lint:
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Dockerfile lint
  #       uses: reviewdog/action-hadolint@v1.46.0
  #       with:
  #         level: warning

  yaml-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: reviewdog/action-yamllint@f01d8a48fd8d89f89895499fca2cff09f9e9e8c0 # v1.21.0
        with:
          github_token: ${{ github.token }}
          level: warning
          yamllint_flags: "-c .yamllint ."

  compose-config-schema-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: tools/cmt/go.mod
          cache-dependency-path: tools/cmt/go.sum
      - name: Install check-jsonschema
        run: python -m pip install --upgrade check-jsonschema
      - name: Generate cmt schemas
        working-directory: tools/cmt
        run: |
          set -euo pipefail
          mkdir -p /tmp/cmt-schemas
          go run . schema cmt > /tmp/cmt-schemas/cmt.schema.json
          go run . schema host > /tmp/cmt-schemas/host.schema.json
      - name: Validate compose config YAML files
        run: |
          set -euo pipefail
          python -m check_jsonschema --schemafile /tmp/cmt-schemas/cmt.schema.json compose/config.yml
          python -m check_jsonschema --schemafile /tmp/cmt-schemas/host.schema.json compose/hosts/*/host.yml

  markdown-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: reviewdog/action-markdownlint@3667398db9118d7e78f7a63d10e26ce454ba5f58 # v0.26.2
        with:
          github_token: ${{ github.token }}
          level: warning

  shell-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1.32.0
        with:
          github_token: ${{ github.token }}
          level: warning
      - uses: reviewdog/action-shfmt@d8f080930b9be5847b4f97e9f4122b81a82aaeac # v1.0.4
        with:
          github_token: ${{ github.token }}
          level: warning

  action-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          github_token: ${{ github.token }}
          level: warning
          fail_level: any

  dotenv-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dotenv-linter/action-dotenv-linter@afde61cfda2ecffe7bea35837b6f20b956c88689 # v3.0.0
        with:
          github_token: ${{ github.token }}

  kics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run KICS via Docker (Makefile target)
        run: make kics

  sops-secrets-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run sops secrets check
        run: make sops-ci

  renovate-deps-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: shiron-dev/actions/renovate-deps-comment@0cc65c3143f6a0d119fa8085c8b2ae3dd25e657b # v1.6.3

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            log_opts="${HEAD_SHA}^..${HEAD_SHA}"
          else
            log_opts="${BASE_SHA}..${HEAD_SHA}"
          fi

          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git --verbose --log-opts="${log_opts}" /repo

  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
