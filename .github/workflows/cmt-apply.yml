name: Compose CMT Apply CI

on:
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  id-token: write

jobs:
  cancel-stale-runs:
    name: cancel stale runs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace("refs/heads/", "");
            const currentRunId = context.runId;
            const currentRunNumber = context.runNumber;
            const workflowRef = process.env.GITHUB_WORKFLOW_REF || "";
            const workflowId = workflowRef
              .split("@")[0]
              .replace(`${owner}/${repo}/`, "");

            if (!workflowId) {
              core.warning("Failed to resolve workflow_id from GITHUB_WORKFLOW_REF. Skip stale run cancellation.");
              return;
            }

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: workflowId,
                branch,
                event: "push",
                per_page: 100,
              },
            );

            const activeStatuses = new Set([
              "queued",
              "in_progress",
              "waiting",
              "requested",
              "pending",
              "action_required",
            ]);

            const candidates = runs.filter((run) => {
              if (run.id === currentRunId) return false;
              if (run.run_number >= currentRunNumber) return false;
              if (!activeStatuses.has(run.status)) return false;
              return true;
            });

            let cancelled = 0;

            for (const run of candidates) {
              const jobs = await github.paginate(
                github.rest.actions.listJobsForWorkflowRun,
                {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                },
              );

              const applyJob = jobs.find((job) => job.name === "cmt apply");
              const applyStarted =
                Boolean(applyJob?.started_at) ||
                applyJob?.status === "in_progress" ||
                Boolean(applyJob?.conclusion);

              if (applyStarted) {
                core.info(`Skip run ${run.id}: apply already started.`);
                continue;
              }

              await github.rest.actions.cancelWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });
              cancelled += 1;
              core.info(`Cancelled stale run ${run.id}.`);
            }

            core.info(`Cancelled ${cancelled} stale run(s).`);

  plan:
    name: cmt plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-plan
    if: github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    needs: cancel-stale-runs
    outputs:
      has_diff: ${{ steps.cmt-plan.outputs.exit_code == '2' }}
      plan_sha256: ${{ steps.cmt-plan.outputs.plan_sha256 }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-compose-cmt
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Run cmt plan
        id: cmt-plan
        env:
          CMT_OPT: "--exit-status"
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          make cmt-init

          set +e

          output_file="$(mktemp)"
          digest_file="$(mktemp --suffix=.sha256)"
          tools/cmt/cmt --config compose/config.yml plan --host=arm-srv --exit-status --digest-file "$digest_file" 2>&1 | tee "$output_file"
          exit_code="${PIPESTATUS[0]}"
          slack_file="$(mktemp --suffix=.txt)"
          sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' "$output_file" | iconv -f UTF-8 -t UTF-8 -c > "$slack_file" || cp "$output_file" "$slack_file"
          if [ ! -s "$output_file" ]; then
            echo "cmt plan produced no output." > "$output_file"
          fi
          if [ ! -s "$slack_file" ]; then
            echo "cmt plan produced no output." > "$slack_file"
          fi
          plan_sha256="$(tr -d '\r\n' < "$digest_file")"

          summary_line="$(tr -d '\r' < "$slack_file" | awk '/^Summary: /{line=$0} END{print line}')"
          if [ -z "$summary_line" ]; then
            summary_line="Summary: (not found)"
          fi

          {
            echo "output_file=${output_file}"
            echo "slack_file=${slack_file}"
            echo "summary=${summary_line}"
            echo "exit_code=${exit_code}"
            echo "plan_sha256=${plan_sha256}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "output_file=${output_file}"
          } >> "$GITHUB_ENV"
      - name: Upload plan result to Slack
        id: slack-upload
        if: steps.cmt-plan.outputs.exit_code == '2'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel_id: ${{ vars.SLACK_PR_PLAN_CHANNEL_ID }}
            snippet_type: text
            title: CMT Plan Result (${{ github.repository }})
            filename: cmt-plan-${{ github.run_id }}.txt
            initial_comment: |
              CMT plan result for ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              ${{ steps.cmt-plan.outputs.summary }}
            file: ${{ steps.cmt-plan.outputs.slack_file }}
      - name: Fail when cmt plan failed
        if: steps.cmt-plan.outputs.exit_code != '0' && steps.cmt-plan.outputs.exit_code != '2'
        run: exit 1

  apply:
    name: cmt apply
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    if: needs.plan.outputs.has_diff == 'true'
    needs: plan
    concurrency:
      group: ${{ github.workflow }}-apply
      cancel-in-progress: false
    steps:
      - name: Check run is latest before apply
        id: stale-check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = context.runId;
            const currentRunNumber = context.runNumber;
            const workflowRef = process.env.GITHUB_WORKFLOW_REF || "";
            const workflowId = workflowRef
              .split("@")[0]
              .replace(`${owner}/${repo}/`, "");

            if (!workflowId) {
              core.setFailed("Failed to resolve workflow_id from GITHUB_WORKFLOW_REF.");
              return;
            }

            const request = {
              owner,
              repo,
              workflow_id: workflowId,
              event: context.eventName,
              per_page: 100,
            };
            if (context.eventName === "workflow_dispatch") {
              request.branch = context.ref.replace("refs/heads/", "");
            }

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              request,
            );

            const newerRun = runs.find(
              (run) => run.id !== currentRunId && run.run_number > currentRunNumber,
            );

            if (newerRun) {
              const message = `Skip apply for stale run ${currentRunId}: newer ${context.eventName} run ${newerRun.id} exists.`;
              if (context.eventName === "merge_group") {
                core.setFailed(message);
                return;
              }
              core.warning(message);
              core.setOutput("is_latest", "false");
              return;
            }

            core.setOutput("is_latest", "true");
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.stale-check.outputs.is_latest == 'true'
      - uses: ./.github/actions/setup-compose-cmt
        if: steps.stale-check.outputs.is_latest == 'true'
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Check run is latest before cmt apply
        id: pre-apply-stale-check
        if: steps.stale-check.outputs.is_latest == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = context.runId;
            const currentRunNumber = context.runNumber;
            const workflowRef = process.env.GITHUB_WORKFLOW_REF || "";
            const workflowId = workflowRef
              .split("@")[0]
              .replace(`${owner}/${repo}/`, "");

            if (!workflowId) {
              core.setFailed("Failed to resolve workflow_id from GITHUB_WORKFLOW_REF.");
              return;
            }

            const request = {
              owner,
              repo,
              workflow_id: workflowId,
              event: context.eventName,
              per_page: 100,
            };
            if (context.eventName === "workflow_dispatch") {
              request.branch = context.ref.replace("refs/heads/", "");
            }

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              request,
            );

            const newerRun = runs.find(
              (run) => run.id !== currentRunId && run.run_number > currentRunNumber,
            );

            if (newerRun) {
              const message = `Skip cmt apply for stale run ${currentRunId}: newer ${context.eventName} run ${newerRun.id} exists.`;
              if (context.eventName === "merge_group") {
                core.setFailed(message);
                return;
              }
              core.warning(message);
              core.setOutput("is_latest", "false");
              return;
            }

            core.setOutput("is_latest", "true");
      - name: Verify approved cmt plan
        id: verify-plan
        if: steps.stale-check.outputs.is_latest == 'true' && steps.pre-apply-stale-check.outputs.is_latest == 'true'
        env:
          APPROVED_PLAN_SHA256: ${{ needs.plan.outputs.plan_sha256 }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          make cmt-init

          set +e

          output_file="$(mktemp)"
          digest_file="$(mktemp --suffix=.sha256)"
          tools/cmt/cmt --config compose/config.yml plan --host=arm-srv --exit-status --digest-file "$digest_file" > "$output_file" 2>&1
          exit_code="$?"
          slack_file="$(mktemp --suffix=.txt)"
          sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' "$output_file" | iconv -f UTF-8 -t UTF-8 -c > "$slack_file" || cp "$output_file" "$slack_file"
          if [ ! -s "$slack_file" ]; then
            echo "cmt plan produced no output." > "$slack_file"
          fi
          current_plan_sha256="$(tr -d '\r\n' < "$digest_file")"

          if [ "$exit_code" != "2" ]; then
            echo "Expected cmt plan to still report changes before apply, got exit code ${exit_code}."
            cat "$slack_file"
            exit 1
          fi

          if [ "$current_plan_sha256" != "$APPROVED_PLAN_SHA256" ]; then
            echo "cmt plan changed after production approval."
            echo "Approved plan SHA-256: ${APPROVED_PLAN_SHA256}"
            echo "Current plan SHA-256:  ${current_plan_sha256}"
            cat "$slack_file"
            exit 1
          fi

          echo "matches=true" >> "$GITHUB_OUTPUT"
      - name: Run cmt apply
        if: steps.stale-check.outputs.is_latest == 'true' && steps.pre-apply-stale-check.outputs.is_latest == 'true' && steps.verify-plan.outputs.matches == 'true'
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: make cmt-apply CMT_OPT="--host=arm-srv --auto-approve --expected-plan-sha256 ${{ needs.plan.outputs.plan_sha256 }}"

  cmt-apply-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ always() }}
    needs:
      - cancel-stale-runs
      - plan
      - apply
    steps:
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done
