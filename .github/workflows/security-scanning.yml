name: Security Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  security-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - gitleaks
      - trufflehog
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check security-status-check
        run: |
          diff \
            <(yq ".jobs | del(.security-status-check) | keys.[]" .github/workflows/security-scanning.yml) \
            <(yq ".jobs.security-status-check.needs.[]" .github/workflows/security-scanning.yml)
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success)$ ]]; then
              exit 1
            fi
          done

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@6c01749c5814772eca1b28e2567a3d5a7b941e1a # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@9d4dd6dc0e18b2b99b9b0b3a6c5e7f9c1e3a5b7d # main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}
          head: ${{ github.event.pull_request.head.ref || github.ref_name }}
