name: Compose CMT CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            src:
              - "compose/**"
              - "tools/compose/**"
              - ".github/workflows/**"

  plan:
    name: cmt plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-plan
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.should_run == 'true' }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-compose-cmt
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}
          GH_ACTIONS_SSH_PRIVATE_KEY: ${{ secrets.GH_ACTIONS_SSH_PRIVATE_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Verify SSH via Cloudflare Access
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          echo "CF_ACCESS_CLIENT_ID"
          test -n "${CF_ACCESS_CLIENT_ID}"
          echo "CF_ACCESS_CLIENT_SECRET"
          test -n "${CF_ACCESS_CLIENT_SECRET}"
          echo "TUNNEL_SERVICE_TOKEN_ID"
          test -n "${TUNNEL_SERVICE_TOKEN_ID}"
          echo "TUNNEL_SERVICE_TOKEN_SECRET"
          test -n "${TUNNEL_SERVICE_TOKEN_SECRET}"
          ssh \
            -F compose/ssh_config \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=accept-new \
            ansible_user@arm-srv.shiron.dev \
            "echo ssh-ok from github-actions"
      - name: Run cmt plan
        id: cmt-plan
        env:
          CMT_OPT: "--exit-status"
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set +e

          output_file="$(mktemp)"
          slack_file="$(mktemp --suffix=.txt)"
          make cmt-plan >"$output_file" 2>&1
          exit_code="$?"
          sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' "$output_file" | iconv -f UTF-8 -t UTF-8 -c > "$slack_file" || cp "$output_file" "$slack_file"
          if [ ! -s "$output_file" ]; then
            echo "cmt plan produced no output." > "$output_file"
          fi
          if [ ! -s "$slack_file" ]; then
            echo "cmt plan produced no output." > "$slack_file"
          fi

          summary_line="$(tr -d '\r' < "$output_file" | awk '/^Summary: /{line=$0} END{print line}')"
          if [ -z "$summary_line" ]; then
            summary_line="Summary: (not found)"
          fi

          {
            echo "slack_file=${slack_file}"
            echo "summary=${summary_line}"
            echo "exit_code=${exit_code}"
          } >> "$GITHUB_OUTPUT"
          rm -f "$output_file"
      - name: Upload plan result to Slack plan channel
        id: slack-upload
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel_id: ${{ secrets.SLACK_PLAN_CHANNEL_ID }}
            snippet_type: text
            title: CMT Plan Result (${{ github.repository }})
            filename: cmt-plan-${{ github.event.pull_request.number }}-${{ github.run_id }}.txt
            initial_comment: |
              CMT plan result for ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              ${{ steps.cmt-plan.outputs.summary }}
            file: ${{ steps.cmt-plan.outputs.slack_file }}
      - name: Extract Slack permalink
        id: slack-link
        env:
          SLACK_RESPONSE: ${{ steps.slack-upload.outputs.response }}
        run: |
          permalink="$(jq -r '.files[0].permalink // empty' <<<"$SLACK_RESPONSE")"
          if [ -z "$permalink" ]; then
            echo "Failed to parse Slack permalink from upload response." >&2
            exit 1
          fi
          echo "permalink=${permalink}" >> "$GITHUB_OUTPUT"
      - name: Prepare comment body
        id: prepare-comment
        run: |
          exit_code="${{ steps.cmt-plan.outputs.exit_code }}"
          comment_file="$GITHUB_WORKSPACE/comment_body.md"
          {
            echo "### \`make cmt-plan\` result"
            echo ""
            if [ "$exit_code" = "0" ]; then
              echo "No changes."
            else
              echo "${{ steps.cmt-plan.outputs.summary }}"
            fi
            echo ""
            echo "Plan details: ${{ steps.slack-link.outputs.permalink }}"
          } > "$comment_file"
          echo "path=${comment_file}" >> "$GITHUB_OUTPUT"
      - name: Comment cmt plan result
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: cmt-plan
          path: ${{ steps.prepare-comment.outputs.path }}
      - name: Fail when cmt plan failed
        if: steps.cmt-plan.outputs.exit_code == '1'
        run: exit 1

  cmt-plan-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ always() }}
    needs:
      - changes
      - plan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check cmt-plan-status-check
        run: |
          diff \
            <(yq '.jobs | del(.cmt-plan-status-check) | keys.[]' .github/workflows/compose-cmt.yml) \
            <(yq '.jobs.cmt-plan-status-check.needs.[]' .github/workflows/compose-cmt.yml)
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done
