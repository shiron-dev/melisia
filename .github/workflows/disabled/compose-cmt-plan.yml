name: Compose CMT CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - "compose/**"
              - "tools/compose/**"
              - ".github/workflows/**"

  plan:
    name: cmt plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-plan
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.should_run == 'true' }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-compose-cmt
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}
          GH_ACTIONS_SSH_PRIVATE_KEY: ${{ secrets.GH_ACTIONS_SSH_PRIVATE_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Verify SSH via Cloudflare Access
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          echo "CF_ACCESS_CLIENT_ID"
          test -n "${CF_ACCESS_CLIENT_ID}"
          echo "CF_ACCESS_CLIENT_SECRET"
          test -n "${CF_ACCESS_CLIENT_SECRET}"
          echo "TUNNEL_SERVICE_TOKEN_ID"
          test -n "${TUNNEL_SERVICE_TOKEN_ID}"
          echo "TUNNEL_SERVICE_TOKEN_SECRET"
          test -n "${TUNNEL_SERVICE_TOKEN_SECRET}"
          ssh \
            -F compose/ssh_config \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=accept-new \
            ansible_user@arm-srv.shiron.dev \
            "echo ssh-ok from github-actions"
      - name: Run cmt plan
        id: cmt-plan
        env:
          CMT_OPT: "--exit-status"
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set +e

          make cmt-plan > "$GITHUB_WORKSPACE/plan_output.txt" 2>&1
          exit_code=$?

          summary_line="$(tr -d '\r' < "$GITHUB_WORKSPACE/plan_output.txt" | awk '/^Summary: /{line=$0} END{print line}')"
          if [ -z "$summary_line" ]; then
            summary_line="Summary: (not found)"
          fi

          echo "summary=${summary_line}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
      - name: Upload plan to Slack
        id: slack-upload
        if: steps.cmt-plan.outputs.exit_code != '0' && steps.cmt-plan.outputs.exit_code != ''
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel_id: ${{ secrets.SLACK_PLAN_CHANNEL_ID }}
            snippet_type: text
            title: "CMT Plan (${{ github.repository }}) - PR #${{ github.event.number }}"
            filename: cmt-plan-${{ github.run_id }}.txt
            initial_comment: |
              CMT plan result for PR #${{ github.event.number }}: ${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.number }}
              ${{ steps.cmt-plan.outputs.summary }}
            file: ${{ github.workspace }}/plan_output.txt
      - name: Extract Slack permalink
        id: slack-link
        if: steps.slack-upload.outcome == 'success'
        env:
          SLACK_RESPONSE: ${{ steps.slack-upload.outputs.response-payload }}
        run: |
          permalink=$(jq -r '(.files[0].permalink // empty)' <<< "$SLACK_RESPONSE" 2>/dev/null || true)
          echo "url=${permalink}" >> "$GITHUB_OUTPUT"
      - name: Prepare comment body
        id: prepare-comment
        env:
          PLAN_EXIT_CODE: ${{ steps.cmt-plan.outputs.exit_code }}
          PLAN_SUMMARY: ${{ steps.cmt-plan.outputs.summary }}
          SLACK_URL: ${{ steps.slack-link.outputs.url }}
        run: |
          comment_file="$GITHUB_WORKSPACE/comment_body.md"
          if [ "$PLAN_EXIT_CODE" = "0" ]; then
            {
              echo "### \`make cmt-plan\` result"
              echo ""
              echo "No changes."
            } > "$comment_file"
          elif [ "$PLAN_EXIT_CODE" = "2" ]; then
            {
              echo "### \`make cmt-plan\` result"
              echo ""
              echo "$PLAN_SUMMARY"
              echo ""
              echo ":warning: Changes detected."
              if [ -n "$SLACK_URL" ]; then
                echo ""
                echo "Plan details: [View in Slack]($SLACK_URL)"
              else
                echo ""
                echo "Plan details have been posted to the Slack plan channel."
              fi
            } > "$comment_file"
          else
            {
              echo "### \`make cmt-plan\` result"
              echo ""
              echo ":x: Plan failed (exit code: $PLAN_EXIT_CODE)."
              if [ -n "$SLACK_URL" ]; then
                echo ""
                echo "Details: [View in Slack]($SLACK_URL)"
              else
                echo ""
                echo "Details have been posted to the Slack plan channel."
              fi
            } > "$comment_file"
          fi
          echo "path=${comment_file}" >> "$GITHUB_OUTPUT"
      - name: Comment cmt plan result
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: cmt-plan
          path: ${{ steps.prepare-comment.outputs.path }}
      - name: Fail when cmt plan failed
        if: steps.cmt-plan.outputs.exit_code == '1'
        run: exit 1

  cmt-plan-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ always() }}
    needs:
      - changes
      - plan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check cmt-plan-status-check
        run: |
          diff \
            <(yq '.jobs | del(.cmt-plan-status-check) | keys.[]' .github/workflows/compose-cmt.yml) \
            <(yq '.jobs.cmt-plan-status-check.needs.[]' .github/workflows/compose-cmt.yml)
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done
