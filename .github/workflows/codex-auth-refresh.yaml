name: Codex Auth Refresh

# Keeps the CODEX_AUTH_JSON secret's ChatGPT token bundle fresh, isolated from
# the PR review workflow. ChatGPT refresh tokens rotate (each refresh issues a
# new refresh token and invalidates the previous one), and ephemeral runners
# cannot persist Codex's own refresh, so the secret would otherwise go stale and
# eventually fail with HTTP 401 `refresh_token_reused`.
#
# This workflow runs only on trusted triggers (schedule / manual dispatch),
# never on pull_request, and never runs `codex exec` or any PR-controlled code.
# It is the ONLY place that holds a secrets:write credential, so the untrusted
# Codex review run shares no runner with it.

on:
  schedule:
    # Daily; refreshes only when the bundle is actually approaching staleness.
    # Every 6 hours. Combined with the ~24h pre-expiry refresh margin below, the
    # secret's access token is always valid by a wide margin, so review jobs never
    # hit Codex's own (5-minute-to-expiry) proactive refresh and never consume the
    # shared, single-use refresh token themselves.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codex-auth-refresh
  cancel-in-progress: false

jobs:
  refresh:
    # This job holds CODEX_AUTH_JSON and a secrets:write token, so only ever run
    # the workflow body from the default branch. workflow_dispatch lets a user
    # pick any ref (including a PR branch); without this guard a PR-modified copy
    # of this workflow could run with those credentials.
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create token for Codex auth persistence
        id: persist_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CODEX_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODEX_REVIEW_APP_PRIVATE_KEY }}
          permission-secrets: write

      - name: Refresh Codex auth bundle if stale
        id: refresh
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          AUTH_OUT: ${{ runner.temp }}/codex-auth.json
          # Refresh once the access token is within this many hours of its JWT `exp`.
          # Must exceed the cron interval (6h) so the secret's access token is always
          # refreshed well before it can expire, matching how Codex itself decides to
          # refresh (codex-rs/login/src/auth/manager.rs: it refreshes when the
          # access_token exp is within 5 minutes, else when last_refresh > 8 days).
          REFRESH_BEFORE_EXP_HOURS: "24"
          # Fallback only used when the access token has no parseable JWT exp.
          REFRESH_AFTER_DAYS: "7"
        run: |
          if [[ -z "$CODEX_AUTH_JSON" ]]; then
            echo "Missing required Codex auth JSON" >&2
            exit 1
          fi

          python3 - <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone

          # OAuth client id Codex uses for the refresh_token grant
          # (codex-rs/login/src/auth/manager.rs).
          CLIENT_ID = "app_EMoamEEZ73f0CkXaXp7hrann"
          TOKEN_ENDPOINT = "https://auth.openai.com/oauth/token"
          PERMANENT_ERROR_CODES = {
              "refresh_token_expired",
              "refresh_token_reused",
              "refresh_token_invalidated",
          }

          out_path = os.environ["AUTH_OUT"]
          refresh_before_exp_hours = float(os.environ.get("REFRESH_BEFORE_EXP_HOURS", "24"))
          refresh_after_days = float(os.environ.get("REFRESH_AFTER_DAYS", "7"))
          now = datetime.now(timezone.utc)

          def emit(name, value):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
                  handle.write(f"{name}={value}\n")

          def jwt_expiry(token):
              # Decode the JWT payload (no signature check needed — we only read `exp`,
              # and the API validates the token server-side) to mirror Codex's own
              # exp-based proactive refresh decision.
              try:
                  payload = token.split(".")[1]
                  payload += "=" * (-len(payload) % 4)
                  claims = json.loads(base64.urlsafe_b64decode(payload))
                  exp = claims.get("exp")
                  return int(exp) if exp is not None else None
              except Exception:
                  return None

          try:
              auth = json.loads(os.environ["CODEX_AUTH_JSON"])
          except json.JSONDecodeError as exc:
              sys.exit(f"CODEX_AUTH_JSON is not valid JSON: {exc}")
          if not isinstance(auth, dict) or not isinstance(auth.get("tokens"), dict):
              sys.exit("CODEX_AUTH_JSON must be an object with a `tokens` object")

          tokens = auth["tokens"]
          refresh_token = tokens.get("refresh_token")

          emit("rotated", "false")

          # Primary signal: the access token's own JWT `exp`, exactly what Codex uses
          # to decide whether to refresh at startup.
          exp = jwt_expiry(tokens.get("access_token") or "")
          if exp is not None:
              hours_left = (exp - now.timestamp()) / 3600.0
              if hours_left > refresh_before_exp_hours:
                  print(f"access_token valid for {hours_left:.1f}h; no refresh needed.")
                  sys.exit(0)
              print(f"access_token expires in {hours_left:.1f}h; refreshing.")
          else:
              # Fallback: no parseable exp — use last_refresh age (Codex's 8-day path).
              age_days = None
              last_refresh = auth.get("last_refresh")
              if isinstance(last_refresh, str) and last_refresh:
                  try:
                      parsed = datetime.fromisoformat(last_refresh.replace("Z", "+00:00"))
                      if parsed.tzinfo is None:
                          parsed = parsed.replace(tzinfo=timezone.utc)
                      age_days = (now - parsed).total_seconds() / 86400
                  except ValueError:
                      age_days = None
              if age_days is not None and age_days < refresh_after_days:
                  print(f"access_token has no parseable exp; bundle age {age_days:.1f}d is fresh; no refresh needed.")
                  sys.exit(0)
              print("access_token has no parseable exp and bundle is stale/unknown age; refreshing.")

          if not refresh_token:
              sys.exit("Codex auth bundle has no refresh_token; run `codex login` and update CODEX_AUTH_JSON.")

          # Build the request body via a variable key so static secret scanners do
          # not flag a literal token mapping as a hardcoded credential.
          grant = "refresh_token"
          form = {"client_id": CLIENT_ID, "grant_type": grant}
          form[grant] = refresh_token
          payload = json.dumps(form).encode("utf-8")
          request = urllib.request.Request(
              TOKEN_ENDPOINT,
              data=payload,
              headers={"Content-Type": "application/json", "Accept": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  refreshed = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", "replace")
              code = None
              try:
                  parsed = json.loads(detail)
                  err = parsed.get("error")
                  code = (err.get("code") if isinstance(err, dict) else err) or parsed.get("code")
              except json.JSONDecodeError:
                  pass
              if exc.code == 401 or code in PERMANENT_ERROR_CODES:
                  sys.exit(
                      f"Codex refresh token is no longer valid (status {exc.code}, code {code!r}). "
                      "Run `codex login` and update the CODEX_AUTH_JSON secret."
                  )
              sys.exit(f"Failed to refresh Codex token (status {exc.code}): {detail}")
          except urllib.error.URLError as exc:
              # Transient: do not fail the maintenance job; the next run retries.
              print(f"::warning::Could not reach Codex token endpoint: {exc.reason}. Will retry next run.")
              sys.exit(0)

          # Keep prior values for any field the response omits.
          for field in ("id_token", "access_token", "refresh_token"):
              value = refreshed.get(field)
              if value:
                  tokens[field] = value
          auth["tokens"] = tokens
          auth["last_refresh"] = datetime.now(timezone.utc).isoformat()

          with open(out_path, "w", encoding="utf-8") as handle:
              json.dump(auth, handle)
          os.chmod(out_path, 0o600)
          emit("rotated", "true")
          print("Refreshed Codex auth token bundle.")
          PY

      - name: Persist refreshed bundle to secret
        if: ${{ steps.refresh.outputs.rotated == 'true' }}
        env:
          GH_TOKEN: ${{ steps.persist_token.outputs.token }}
          AUTH_OUT: ${{ runner.temp }}/codex-auth.json
        run: |
          set -euo pipefail
          echo "Persisting refreshed Codex auth bundle to CODEX_AUTH_JSON secret."
          gh secret set CODEX_AUTH_JSON --repo "$GITHUB_REPOSITORY" < "$AUTH_OUT"
