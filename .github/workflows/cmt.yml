name: CMT CI

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: tools/cmt

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - ".github/workflows/**"
              - "tools/cmt/**"

  cmt-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - changes
      - go-test
      - fmt-lint
      - go-generate-diff-check
      - go-vet
      - build
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check cmt-status-check
        working-directory: .
        run: |
          diff \
            <(yq ".jobs | del(.cmt-status-check) | keys.[]" .github/workflows/cmt.yml) \
            <(yq ".jobs.cmt-status-check.needs.[]" .github/workflows/cmt.yml)
      - name: Fail if any needed job failed
        working-directory: .
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/cmt/go.mod
          cache-dependency-path: tools/cmt/go.sum
      - uses: GoTestTools/gotestfmt-action@eba2ac97f623e866e7b1b117c99f18b43cd36d18 # v2.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run go test
        run: |
          set -euo pipefail
          go test -json -v -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | gotestfmt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tools/cmt/coverage.out
          flags: cmt

  fmt-lint:
    name: fmt lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/cmt/go.mod
          cache-dependency-path: tools/cmt/go.sum
      - name: Check go fmt
        run: |
          go fmt
      - name: Run golangci-lint
        run: |
          set -euo pipefail
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          "$(go env GOPATH)/bin/golangci-lint" run --config .golangci.yml ./...

  go-generate-diff-check:
    name: go generate diff check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/cmt/go.mod
          cache-dependency-path: tools/cmt/go.sum
      - name: Run go generate
        run: go generate ./...
      - name: Verify generated files are up to date
        run: git diff --exit-code -- .

  go-vet:
    name: go vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/cmt/go.mod
          cache-dependency-path: tools/cmt/go.sum
      - name: Run go vet
        run: go vet ./...

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/cmt/go.mod
          cache-dependency-path: tools/cmt/go.sum
      - name: Build cmt
        run: go build -o cmt .
