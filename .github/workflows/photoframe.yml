name: photoframe CI

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: apps/photoframe

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - ".github/workflows/photoframe.yml"
              - "apps/photoframe/**"
              - "mise.toml"

  photoframe-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - changes
      - go-test
      - fmt-lint
      - go-vet
      - build
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check photoframe-status-check
        working-directory: .
        run: |
          diff \
            <(yq ".jobs | del(.photoframe-status-check) | keys.[]" .github/workflows/photoframe.yml) \
            <(yq ".jobs.photoframe-status-check.needs.[]" .github/workflows/photoframe.yml)
      - name: Fail if any needed job failed
        working-directory: .
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/photoframe/go.mod
          cache: false
      - uses: GoTestTools/gotestfmt-action@eba2ac97f623e866e7b1b117c99f18b43cd36d18 # v2.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run go test
        run: |
          set -euo pipefail
          go test -json -v -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | gotestfmt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/photoframe/coverage.out
          flags: photoframe

  fmt-lint:
    name: fmt lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/photoframe/go.mod
          cache: false
      - name: Check go fmt
        run: |
          go fmt
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false
      - name: Install golangci-lint
        run: mise install golangci-lint
      - name: Run golangci-lint
        run: |
          set -euo pipefail
          golangci-lint run --config .golangci.yml ./...

  go-vet:
    name: go vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/photoframe/go.mod
          cache: false
      - name: Run go vet
        run: go vet ./...

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/photoframe/go.mod
          cache: false
      - name: Build photoframe
        run: go build -o photoframe .
