name: Codex AI Review

on:
  pull_request:
    types:
      - opened
      - edited
      - review_requested
      - synchronize
      - reopened
      - ready_for_review
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created

permissions:
  contents: read

jobs:
  review-precheck:
    if: >-
      ${{
        github.event_name == 'pull_request' ||
        (
          (
            github.event_name == 'pull_request_review_comment' ||
            (github.event_name == 'issue_comment' && github.event.issue.pull_request)
          ) &&
          (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.precheck.outputs.should_run }}
      pr_number: ${{ steps.precheck.outputs.pr_number }}
      base_sha: ${{ steps.precheck.outputs.base_sha }}
      head_sha: ${{ steps.precheck.outputs.head_sha }}
      base_ref: ${{ steps.precheck.outputs.base_ref }}
      pr_title: ${{ steps.precheck.outputs.pr_title }}
      draft: ${{ steps.precheck.outputs.draft }}
      is_internal_pr: ${{ steps.precheck.outputs.is_internal_pr }}
      force_run: ${{ steps.precheck.outputs.force_run }}
    permissions:
      pull-requests: read
    steps:
      - name: Precheck review trigger before loading app secrets
        id: precheck
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const allowedAssociations = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const reviewCommandPattern = /(^|\n)\s*\/review(?:\s|$)/;
            const renovateLogins = new Set(["app/renovate", "renovate[bot]", "renovate-bot"]);

            const isRenovatePullRequest = (pr) => {
              const authorLogin = pr.user?.login ?? "";
              return renovateLogins.has(authorLogin);
            };

            const setPullRequestOutputs = (pr, shouldRun, forceRun = false) => {
              const isInternalPr = pr.head.repo.full_name === `${owner}/${repo}`;
              const isRenovatePr = isRenovatePullRequest(pr);
              core.setOutput("should_run", shouldRun ? "true" : "false");
              core.setOutput("pr_number", String(pr.number));
              core.setOutput("base_sha", pr.base.sha);
              core.setOutput("head_sha", pr.head.sha);
              core.setOutput("base_ref", pr.base.ref);
              core.setOutput("pr_title", pr.title);
              core.setOutput("draft", String(Boolean(pr.draft)));
              core.setOutput("is_internal_pr", String(isInternalPr));
              core.setOutput("force_run", forceRun ? "true" : "false");

              if (isRenovatePr) {
                core.info(`Skipping Codex AI review for Renovate PR #${pr.number}.`);
                core.setOutput("should_run", "false");
                core.setOutput("force_run", "false");
              }
            };

            if (context.eventName === "pull_request") {
              const pr = context.payload.pull_request;
              const isInternalPr = pr.head.repo.full_name === `${owner}/${repo}`;
              setPullRequestOutputs(pr, !pr.draft && isInternalPr, false);
              return;
            }

            if (context.eventName !== "issue_comment" && context.eventName !== "pull_request_review_comment") {
              core.setOutput("should_run", "false");
              core.setOutput("force_run", "false");
              return;
            }

            const body = (context.payload.comment?.body || "").trim();
            if (!reviewCommandPattern.test(body)) {
              core.setOutput("should_run", "false");
              core.setOutput("force_run", "false");
              return;
            }

            const association = context.payload.comment?.author_association;
            if (!allowedAssociations.has(association)) {
              core.setOutput("should_run", "false");
              core.setOutput("force_run", "false");
              return;
            }

            let pullNumber = null;
            if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;
              if (!issue?.pull_request) {
                core.setOutput("should_run", "false");
                core.setOutput("force_run", "false");
                return;
              }
              pullNumber = issue.number;
            } else {
              pullNumber = context.payload.pull_request?.number ?? null;
              if (!pullNumber) {
                const pullRequestUrl = context.payload.comment?.pull_request_url;
                const match = typeof pullRequestUrl === "string" ? pullRequestUrl.match(/\/pulls?\/(\d+)$/) : null;
                if (match) {
                  pullNumber = Number(match[1]);
                }
              }

              if (!pullNumber) {
                core.setOutput("should_run", "false");
                core.setOutput("force_run", "false");
                return;
              }
            }

            const response = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });
            const pr = response.data;
            const isInternalPr = pr.head.repo.full_name === `${owner}/${repo}`;
            setPullRequestOutputs(pr, !pr.draft && isInternalPr, true);

  review-state:
    needs: review-precheck
    if: ${{ needs.review-precheck.result == 'success' && needs.review-precheck.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: codex-ai-review-${{ needs.review-precheck.outputs.pr_number }}
      cancel-in-progress: true
    outputs:
      should_run: ${{ steps.review_state.outputs.should_run }}
      pr_number: ${{ steps.review_state.outputs.pr_number }}
      base_sha: ${{ steps.review_state.outputs.base_sha }}
      head_sha: ${{ steps.review_state.outputs.head_sha }}
      base_ref: ${{ steps.review_state.outputs.base_ref }}
      pr_title: ${{ steps.review_state.outputs.pr_title }}
      draft: ${{ steps.review_state.outputs.draft }}
      is_internal_pr: ${{ steps.review_state.outputs.is_internal_pr }}
      bot_login: ${{ steps.add_eyes.outputs.bot_login }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CODEX_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODEX_REVIEW_APP_PRIVATE_KEY }}

      - name: Decide whether review should run
        id: review_state
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REVIEW_MARKER: <!-- codex-ai-review -->
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
          PR_NUMBER: ${{ needs.review-precheck.outputs.pr_number }}
          FORCE_RUN: ${{ needs.review-precheck.outputs.force_run }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const marker = process.env.REVIEW_MARKER;
            const appSlug = process.env.APP_SLUG;
            const { owner, repo } = context.repo;
            const pullNumber = Number(process.env.PR_NUMBER);
            const forceRun = process.env.FORCE_RUN === "true";

            const response = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });
            const pr = response.data;

            const isInternalPr = pr.head.repo.full_name === `${owner}/${repo}`;
            const botLogin = appSlug ? `${appSlug}[bot]` : null;
            const prAuthorLogin = pr.user?.login ?? null;

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("base_sha", pr.base.sha);
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("pr_title", pr.title);
            core.setOutput("draft", String(Boolean(pr.draft)));
            core.setOutput("is_internal_pr", String(isInternalPr));

            if (pr.draft || !isInternalPr) {
              core.setOutput("should_run", "false");
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const codexApprovedReviews = reviews.filter((review) => {
              return (
                review.state === "APPROVED" &&
                (!botLogin || review.user?.login === botLogin) &&
                typeof review.body === "string" &&
                review.body.includes(marker)
              );
            });

            if (context.payload.action === "synchronize") {
              for (const review of codexApprovedReviews) {
                await github.rest.pulls.dismissReview({
                  owner,
                  repo,
                  pull_number: pr.number,
                  review_id: review.id,
                  message: "PR が更新されたため、以前の Codex 承認を取り消します。",
                });
              }

              if (!(botLogin && prAuthorLogin === botLogin)) {
                core.setOutput("should_run", "true");
                return;
              }
            }

            if (botLogin && prAuthorLogin === botLogin) {
              core.info(`Skipping Codex AI review for PR #${pr.number} because it was opened by ${botLogin}.`);
              core.setOutput("should_run", "false");
              return;
            }

            const fetchThreadCommentAuthors = async (threadId, initialConnection) => {
              const authors = [
                ...((initialConnection?.nodes || []).map((comment) => comment.author?.login).filter(Boolean)),
              ];
              let hasNextPage = Boolean(initialConnection?.pageInfo?.hasNextPage);
              let cursor = initialConnection?.pageInfo?.endCursor ?? null;

              while (hasNextPage) {
                const response = await github.graphql(
                  `
                    query($threadId: ID!, $after: String) {
                      node(id: $threadId) {
                        ... on PullRequestReviewThread {
                          comments(first: 100, after: $after) {
                            nodes {
                              author {
                                login
                              }
                            }
                            pageInfo {
                              hasNextPage
                              endCursor
                            }
                          }
                        }
                      }
                    }
                  `,
                  {
                    threadId,
                    after: cursor,
                  }
                );
                const connection = response.node?.comments;
                authors.push(
                  ...((connection?.nodes || []).map((comment) => comment.author?.login).filter(Boolean))
                );
                hasNextPage = Boolean(connection?.pageInfo?.hasNextPage);
                cursor = connection?.pageInfo?.endCursor ?? null;
              }

              return authors;
            };

            const reviewThreads = [];
            let reviewThreadsCursor = null;
            let hasMoreReviewThreads = true;

            while (hasMoreReviewThreads) {
              const response = await github.graphql(
                `
                  query($owner: String!, $repo: String!, $pullNumber: Int!, $after: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $pullNumber) {
                        reviewThreads(first: 100, after: $after) {
                          nodes {
                            id
                            isResolved
                            comments(first: 100) {
                              nodes {
                                author {
                                  login
                                }
                              }
                              pageInfo {
                                hasNextPage
                                endCursor
                              }
                            }
                          }
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                        }
                      }
                    }
                  }
                `,
                {
                  owner,
                  repo,
                  pullNumber: pr.number,
                  after: reviewThreadsCursor,
                }
              );
              const connection = response.repository.pullRequest.reviewThreads;
              for (const thread of connection.nodes || []) {
                const authors = await fetchThreadCommentAuthors(thread.id, thread.comments);
                reviewThreads.push({
                  id: thread.id,
                  isResolved: thread.isResolved,
                  authors,
                });
              }
              hasMoreReviewThreads = Boolean(connection.pageInfo?.hasNextPage);
              reviewThreadsCursor = connection.pageInfo?.endCursor ?? null;
            }

            const codexThreads = reviewThreads.filter((thread) =>
              thread.authors.some((authorLogin) => !botLogin || authorLogin === botLogin)
            );
            const unresolvedCodexThreads = codexThreads.filter((thread) => !thread.isResolved);

            if (forceRun) {
              core.setOutput("should_run", "true");
              return;
            }

            if (unresolvedCodexThreads.length > 0) {
              core.setOutput("should_run", "false");
              return;
            }

            core.setOutput("should_run", codexApprovedReviews.length > 0 ? "false" : "true");

      - name: Add eyes reaction to PR
        id: add_eyes
        if: ${{ steps.review_state.outputs.should_run == 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.review_state.outputs.pr_number }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const response = await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/reactions", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              content: "eyes",
              headers: {
                accept: "application/vnd.github+json",
              },
            });

            core.setOutput("bot_login", response.data.user?.login || "");
            const botLogin = response.data.user?.login || "";
            if (botLogin) {
              const reactions = await github.paginate("GET /repos/{owner}/{repo}/issues/{issue_number}/reactions", {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
                headers: {
                  accept: "application/vnd.github+json",
                },
              });

              for (const reaction of reactions) {
                if (reaction.content === "rocket" && reaction.user?.login === botLogin) {
                  await github.request("DELETE /repos/{owner}/{repo}/issues/{issue_number}/reactions/{reaction_id}", {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    reaction_id: reaction.id,
                    headers: {
                      accept: "application/vnd.github+json",
                    },
                  });
                }
              }
            }

      - name: Add eyes reaction to review command
        if: ${{ steps.review_state.outputs.should_run == 'true' && (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const commentId = context.payload.comment?.id;
            if (!commentId) return;
            const route = context.eventName === "pull_request_review_comment"
              ? "POST /repos/{owner}/{repo}/pulls/comments/{comment_id}/reactions"
              : "POST /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions";

            await github.request(route, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              content: "eyes",
              headers: {
                accept: "application/vnd.github+json",
              },
            });

  codex-review:
    needs:
      - review-precheck
      - review-state
    if: ${{ needs.review-state.result == 'success' && needs.review-state.outputs.should_run == 'true' }}
    concurrency:
      group: codex-ai-review-${{ needs.review-precheck.outputs.pr_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out PR head commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.review-state.outputs.head_sha }}
          fetch-depth: 1

      - name: Pre-fetch base and head with their merge-base for the PR event
        env:
          BASE_SHA: ${{ needs.review-state.outputs.base_sha }}
          HEAD_SHA: ${{ needs.review-state.outputs.head_sha }}
        run: |
          # Avoid a full-history clone (fetch-depth: 0). Fetch only the base and
          # head commits, then deepen progressively until their merge-base is
          # present, which the three-dot `git diff $BASE...$HEAD` in the review
          # prompt requires. In the common case the merge-base is shallow, so
          # this is far cheaper than fetching all history.
          git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"
          depth=1
          until git merge-base "$BASE_SHA" "$HEAD_SHA" >/dev/null 2>&1; do
            depth=$((depth * 2))
            if [[ "$depth" -gt 1024 ]]; then
              # Deepening hit the cap without surfacing the merge-base. A plain
              # fetch would leave the shallow boundary in place, so the
              # subsequent three-dot diff could still fail with "no merge base".
              # Fully unshallow instead, then confirm the merge-base really
              # exists before continuing (fail loudly rather than later).
              echo "Merge-base not found within depth $depth; unshallowing the repository." >&2
              git fetch --no-tags --unshallow origin "$BASE_SHA" "$HEAD_SHA" ||
                git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"
              if ! git merge-base "$BASE_SHA" "$HEAD_SHA" >/dev/null 2>&1; then
                echo "Merge-base of $BASE_SHA and $HEAD_SHA still missing after a full fetch." >&2
                exit 1
              fi
              break
            fi
            git fetch --no-tags --deepen="$depth" origin "$BASE_SHA" "$HEAD_SHA"
          done

      # Seed Codex's auth bundle from the secret, read-only. This job holds NO
      # secrets:write credential: the rotating ChatGPT refresh token is refreshed
      # and persisted out-of-band by the codex-auth-refresh.yml scheduled workflow,
      # which never runs `codex exec` or any PR-controlled code. Keeping all
      # privileged operations off this runner means a prompt injection in the
      # untrusted Codex run has nothing to exfiltrate.
      - name: Prepare Codex auth home
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_HOME: ${{ runner.temp }}/codex-home
        run: |
          if [[ -z "$CODEX_AUTH_JSON" ]]; then
            echo "Missing required Codex auth JSON" >&2
            exit 1
          fi

          mkdir -p "$CODEX_HOME"

          # Blank the rotating refresh token before handing auth.json to the
          # untrusted `codex exec` run. The scheduled codex-auth-refresh workflow
          # keeps the access token fresh, so the review never needs to refresh;
          # without the refresh token a prompt injection cannot read or consume the
          # shared, single-use credential. The field is kept (empty) so Codex can
          # still deserialize the bundle, and if the access token has somehow
          # expired the review simply fails instead of rotating the shared token.
          #
          # This runs with the PR head checked out and CODEX_AUTH_JSON in the env.
          # Run it from $RUNNER_TEMP and with `-P` (PYTHONSAFEPATH) so the PR
          # workspace is NOT on Python's import path — otherwise a PR-supplied
          # `json.py`/`os.py` at the repo root could execute (with the secret in
          # env) during `import`, before the token is blanked.
          cd "$RUNNER_TEMP"
          python3 -P - <<'PY'
          import json
          import os
          import sys

          try:
              auth = json.loads(os.environ["CODEX_AUTH_JSON"])
          except json.JSONDecodeError as exc:
              sys.exit(f"CODEX_AUTH_JSON is not valid JSON: {exc}")
          if not isinstance(auth, dict) or not isinstance(auth.get("tokens"), dict):
              sys.exit("CODEX_AUTH_JSON must be an object with a `tokens` object")

          # Use a variable key so static secret scanners do not flag a literal
          # token mapping; keep the field present but empty.
          rt_field = "refresh_token"
          auth["tokens"][rt_field] = ""

          path = os.path.join(os.environ["CODEX_HOME"], "auth.json")
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(auth, handle)
          os.chmod(path, 0o600)
          print("Seeded Codex auth.json without the refresh token.")
          PY

      - name: Load review assets from trusted base commit
        env:
          BASE_SHA: ${{ needs.review-state.outputs.base_sha }}
          TRUSTED_PROMPT_PATH: ${{ runner.temp }}/trusted-codex-pr-review.md
          TRUSTED_SCHEMA_PATH: ${{ runner.temp }}/trusted-codex-pr-review.schema.json
          TRUSTED_SERENA_PROJECT_PATH: ${{ runner.temp }}/trusted-serena-project.yml
        run: |
          if
            git cat-file -e "$BASE_SHA:.github/prompts/codex-pr-review.md" 2>/dev/null &&
            git cat-file -e "$BASE_SHA:.github/schemas/codex-pr-review.schema.json" 2>/dev/null &&
            git cat-file -e "$BASE_SHA:.serena/project.codex-review.yml" 2>/dev/null
          then
            git show "$BASE_SHA:.github/prompts/codex-pr-review.md" > "$TRUSTED_PROMPT_PATH"
            git show "$BASE_SHA:.github/schemas/codex-pr-review.schema.json" > "$TRUSTED_SCHEMA_PATH"
            git show "$BASE_SHA:.serena/project.codex-review.yml" > "$TRUSTED_SERENA_PROJECT_PATH"
          else
            echo "Trusted review assets are missing in base commit $BASE_SHA; using checked-out assets for workflow bootstrap." >&2
            cp .github/prompts/codex-pr-review.md "$TRUSTED_PROMPT_PATH"
            cp .github/schemas/codex-pr-review.schema.json "$TRUSTED_SCHEMA_PATH"
            cp .serena/project.codex-review.yml "$TRUSTED_SERENA_PROJECT_PATH"
          fi

      - name: Collect prior review context
        env:
          PR_NUMBER: ${{ needs.review-state.outputs.pr_number }}
          REVIEW_CONTEXT_PATH: ${{ runner.temp }}/prior-review-context.json
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const pull_number = Number(process.env.PR_NUMBER);
            const { owner, repo } = context.repo;
            const MAX_REVIEWS = 8;
            const MAX_REVIEW_COMMENTS = 20;
            const MAX_REVIEW_THREADS_TO_SCAN = 100;
            const MAX_THREAD_COMMENT_PAGES = 2;
            const normalizeBody = (value) => {
              if (typeof value !== "string") {
                return null;
              }

              const normalized = value
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n")
                .replace(/[\u0000-\u0009\u000b-\u001f\u007f-\u009f]/g, " ")
                .replace(/\n[ \t]+/g, "\n")
                .trim();
              if (!normalized) {
                return null;
              }

              return normalized;
            };

            const parseLastPage = (linkHeader) => {
              if (typeof linkHeader !== "string") {
                return null;
              }

              const lastMatch = linkHeader.match(/[?&]page=(\d+)>; rel="last"/);
              if (lastMatch) {
                return Number(lastMatch[1]);
              }

              return null;
            };

            const hasNextPage = (linkHeader) => {
              return typeof linkHeader === "string" && /rel="next"/.test(linkHeader);
            };

            const fetchRecentItems = async ({ fetchPage, isRelevant, limit }) => {
              if (limit <= 0) {
                return [];
              }

              const firstResponse = await fetchPage(1);
              const lastPage = parseLastPage(firstResponse.headers?.link);
              const cachedResponses = new Map([[1, firstResponse]]);
              const recentItems = [];

              if (lastPage === null) {
                let page = 1;
                let response = firstResponse;

                while (true) {
                  const items = Array.isArray(response.data) ? response.data : [];
                  for (const item of items) {
                    if (!isRelevant(item)) {
                      continue;
                    }
                    recentItems.push(item);
                    if (recentItems.length > limit) {
                      recentItems.shift();
                    }
                  }

                  if (!hasNextPage(response.headers?.link)) {
                    return recentItems.slice().reverse();
                  }

                  page += 1;
                  response = await fetchPage(page);
                }
              }

              for (let page = lastPage; page >= 1 && recentItems.length < limit; page -= 1) {
                const response = cachedResponses.get(page) || await fetchPage(page);
                cachedResponses.set(page, response);

                const items = Array.isArray(response.data) ? response.data : [];
                for (let index = items.length - 1; index >= 0 && recentItems.length < limit; index -= 1) {
                  const item = items[index];
                  if (isRelevant(item)) {
                    recentItems.push(item);
                  }
                }
              }

              return recentItems;
            };

            const reviews = (await fetchRecentItems({
              fetchPage: (page) =>
                github.rest.pulls.listReviews({
                  owner,
                  repo,
                  pull_number,
                  per_page: 100,
                  page,
                }),
              isRelevant: (review) => review.state !== "PENDING",
              limit: MAX_REVIEWS,
            }))
              .sort((left, right) => {
                const leftTime = Date.parse(left.submitted_at || left.created_at || 0);
                const rightTime = Date.parse(right.submitted_at || right.created_at || 0);
                return rightTime - leftTime;
              })
              .slice(0, MAX_REVIEWS);
            const selectedReviewIds = new Set(reviews.map((review) => review.id));

            const reviewComments = (await fetchRecentItems({
              fetchPage: (page) =>
                github.rest.pulls.listReviewComments({
                  owner,
                  repo,
                  pull_number,
                  per_page: 100,
                  page,
                }),
              isRelevant: (comment) => selectedReviewIds.has(comment.pull_request_review_id),
              limit: MAX_REVIEW_COMMENTS,
            }))
              .sort((left, right) => {
                const leftTime = Date.parse(left.created_at || 0);
                const rightTime = Date.parse(right.created_at || 0);
                return rightTime - leftTime;
              })
              .slice(0, MAX_REVIEW_COMMENTS);

            const commentsByReviewId = new Map();
            for (const comment of reviewComments) {
              const reviewId = comment.pull_request_review_id;
              if (!reviewId) {
                continue;
              }
              const existing = commentsByReviewId.get(reviewId) || [];
              existing.push({
                id: comment.id,
                in_reply_to_id: comment.in_reply_to_id ?? null,
                path: comment.path ?? null,
                line: comment.line ?? null,
                start_line: comment.start_line ?? null,
                side: comment.side ?? null,
                start_side: comment.start_side ?? null,
                commit_id: comment.commit_id ?? null,
                original_commit_id: comment.original_commit_id ?? null,
                body: normalizeBody(comment.body),
                author: comment.user?.login ?? null,
                created_at: comment.created_at ?? null,
                updated_at: comment.updated_at ?? null,
                url: comment.html_url ?? null,
              });
              commentsByReviewId.set(reviewId, existing);
            }

            const targetCommentIds = new Set(reviewComments.map((comment) => comment.id));

            const summarizeThreadComments = (comments) => {
              const filteredComments = (comments || []).filter(Boolean);
              const uniqueAuthors = [
                ...new Set(filteredComments.map((comment) => comment.author).filter(Boolean)),
              ].slice(0, 5);
              const latestComments = filteredComments
                .slice()
                .sort((left, right) => {
                  const leftTime = Date.parse(left.created_at || left.updated_at || 0);
                  const rightTime = Date.parse(right.created_at || right.updated_at || 0);
                  return rightTime - leftTime;
                })
                .slice(0, 3)
                .map((comment) => ({
                  author: comment.author,
                  created_at: comment.created_at,
                  body: comment.body,
                }));

              return {
                comment_count: filteredComments.length,
                participant_count: uniqueAuthors.length,
                participants: uniqueAuthors,
                latest_comments: latestComments,
              };
            };

            const fetchThreadContext = async (threadId, initialConnection, targetIds) => {
              const comments = ((initialConnection?.nodes || []).map((comment) => ({
                databaseId: comment.databaseId,
                author: comment.author?.login ?? null,
                created_at: comment.createdAt ?? null,
                updated_at: comment.updatedAt ?? null,
                body: normalizeBody(comment.body ?? null),
              }))).filter((comment) => comment.databaseId);
              const matchedDatabaseIds = comments
                .map((comment) => comment.databaseId)
                .filter((commentId) => targetIds.has(commentId));
              if (matchedDatabaseIds.length > 0 && !Boolean(initialConnection?.pageInfo?.hasPreviousPage)) {
                return {
                  matchedDatabaseIds,
                  threadCommentSummary: summarizeThreadComments(comments),
                };
              }

              let hasPreviousPage = Boolean(initialConnection?.pageInfo?.hasPreviousPage);
              let threadCommentsCursor = initialConnection?.pageInfo?.startCursor ?? null;
              let fetchedCommentPages = initialConnection ? 1 : 0;

              // Walk backward from the newest comments so capped scans preserve recent thread state.
              while (hasPreviousPage && fetchedCommentPages < MAX_THREAD_COMMENT_PAGES) {
                const response = await github.graphql(
                  `
                    query($threadId: ID!, $before: String) {
                      node(id: $threadId) {
                        ... on PullRequestReviewThread {
                          comments(last: 100, before: $before) {
                            nodes {
                              databaseId
                              body
                              createdAt
                              updatedAt
                              author {
                                login
                              }
                            }
                            pageInfo {
                              hasPreviousPage
                              startCursor
                            }
                          }
                        }
                      }
                    }
                  `,
                  {
                    threadId,
                    before: threadCommentsCursor,
                  }
                );

                const connection = response.node?.comments;
                const nextComments = ((connection?.nodes || []).map((comment) => ({
                  databaseId: comment.databaseId,
                  author: comment.author?.login ?? null,
                  created_at: comment.createdAt ?? null,
                  updated_at: comment.updatedAt ?? null,
                  body: normalizeBody(comment.body ?? null),
                }))).filter((comment) => comment.databaseId);
                comments.unshift(...nextComments);
                hasPreviousPage = Boolean(connection?.pageInfo?.hasPreviousPage);
                threadCommentsCursor = connection?.pageInfo?.startCursor ?? null;
                fetchedCommentPages += 1;
              }

              return {
                matchedDatabaseIds: comments
                  .map((comment) => comment.databaseId)
                  .filter((commentId) => targetIds.has(commentId)),
                threadCommentSummary: summarizeThreadComments(comments),
              };
            };

            const threadByCommentId = new Map();
            if (targetCommentIds.size > 0) {
              let cursor = null;
              let hasPreviousPage = true;
              let scannedReviewThreads = 0;

              // Scan newest threads first so the cap preserves recent review context.
              while (
                hasPreviousPage &&
                threadByCommentId.size < targetCommentIds.size &&
                scannedReviewThreads < MAX_REVIEW_THREADS_TO_SCAN
              ) {
                const response = await github.graphql(
                  `
                    query($owner: String!, $repo: String!, $pullNumber: Int!, $before: String) {
                      repository(owner: $owner, name: $repo) {
                        pullRequest(number: $pullNumber) {
                          reviewThreads(last: 100, before: $before) {
                            nodes {
                              id
                              isResolved
                              isOutdated
                              path
                              line
                              originalLine
                              comments(last: 100) {
                                nodes {
                                  databaseId
                                  body
                                  createdAt
                                  updatedAt
                                  author {
                                    login
                                  }
                                }
                                pageInfo {
                                  hasPreviousPage
                                  startCursor
                                }
                              }
                            }
                            pageInfo {
                              hasPreviousPage
                              startCursor
                            }
                          }
                        }
                      }
                    }
                  `,
                  {
                    owner,
                    repo,
                    pullNumber: pull_number,
                    before: cursor,
                  }
                );

                const connection = response.repository.pullRequest.reviewThreads;
                const threads = connection.nodes || [];
                scannedReviewThreads += threads.length;
                for (const thread of threads) {
                  const threadContext = await fetchThreadContext(
                    thread.id,
                    thread.comments,
                    targetCommentIds
                  );
                  const matchedCommentIds = threadContext.matchedDatabaseIds;
                  if (matchedCommentIds.length === 0) {
                    continue;
                  }

                  for (const commentId of matchedCommentIds) {
                    threadByCommentId.set(commentId, {
                      id: thread.id,
                      isResolved: Boolean(thread.isResolved),
                      isOutdated: Boolean(thread.isOutdated),
                      path: thread.path ?? null,
                      line: thread.line ?? null,
                      originalLine: thread.originalLine ?? null,
                      summary: threadContext.threadCommentSummary,
                    });
                  }
                }

                hasPreviousPage = Boolean(connection.pageInfo?.hasPreviousPage);
                cursor = connection.pageInfo?.startCursor ?? null;
              }
            }

            const priorReviewContext = reviews.map((review) => {
              const comments = (commentsByReviewId.get(review.id) || []).map((comment) => ({
                ...comment,
                thread: threadByCommentId.get(comment.id) || null,
              }));

              return {
                id: review.id,
                state: review.state,
                submitted_at: review.submitted_at ?? null,
                commit_id: review.commit_id ?? null,
                author: review.user?.login ?? null,
                has_body: typeof review.body === "string" && review.body.trim().length > 0,
                body: normalizeBody(review.body),
                html_url: review.html_url ?? null,
                comments,
              };
            });

            fs.writeFileSync(
              process.env.REVIEW_CONTEXT_PATH,
              JSON.stringify(priorReviewContext, null, 2)
            );

      - name: Render Codex prompt
        env:
          PR_NUMBER: ${{ needs.review-state.outputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
          BASE_SHA: ${{ needs.review-state.outputs.base_sha }}
          HEAD_SHA: ${{ needs.review-state.outputs.head_sha }}
          PR_TITLE: ${{ needs.review-state.outputs.pr_title }}
          PROMPT_TEMPLATE: ${{ runner.temp }}/trusted-codex-pr-review.md
          REVIEW_CONTEXT_PATH: ${{ runner.temp }}/prior-review-context.json
        run: |
          {
            echo "Repository: $REPOSITORY"
            echo "Pull request number: #$PR_NUMBER"
            echo "Base SHA: $BASE_SHA"
            echo "Head SHA: $HEAD_SHA"
            echo
            echo "Review only this diff:"
            echo "git diff --stat $BASE_SHA...$HEAD_SHA"
            echo "git diff $BASE_SHA...$HEAD_SHA"
            echo
            echo "Pull request title:"
            echo "$PR_TITLE"
            echo
            echo "Prior review context file:"
            echo "$REVIEW_CONTEXT_PATH"
            echo
            cat "$PROMPT_TEMPLATE"
          } > "$RUNNER_TEMP/codex-pr-review.md"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"

      # Restore-only here; the cache is saved by an explicit step below that runs
      # AFTER install but BEFORE the untrusted `codex exec`. With the default
      # actions/cache the save happens in a post step, which would persist any
      # tampering the no-sandbox Codex run made to the tool binaries under the
      # fixed key and replay it on the next run.
      - name: Restore Codex CLI cache
        id: codex_cli_cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.codex-cli
          # -h2 suffix: bumped after the cache-hardening fixes so head never
          # restores an entry that an earlier, vulnerable run on this PR could
          # have poisoned under the old key.
          key: codex-cli-0.124.0-node24.15.0-h2 # gitleaks:allow -- tool cache key, not a secret

      # Install from $RUNNER_TEMP (outside the PR checkout) so npm's project
      # .npmrc search never reaches the checkout, and pin the registry on the
      # command line (which overrides any .npmrc), so a PR-supplied .npmrc cannot
      # redirect npm to an attacker registry and poison the fixed-key cache.
      - name: Install Codex CLI
        if: steps.codex_cli_cache.outputs.cache-hit != 'true'
        working-directory: ${{ runner.temp }}
        run: npm install -g --prefix "$HOME/.codex-cli" --registry=https://registry.npmjs.org/ @openai/codex@0.124.0

      - name: Add Codex CLI to PATH
        run: echo "$HOME/.codex-cli/bin" >> "$GITHUB_PATH"

      # enable-cache: false — the default (auto) turns caching on for hosted
      # runners and saves UV_CACHE_DIR in a post step, i.e. after the untrusted
      # `codex exec`, which would persist whatever it wrote there. The tool is
      # cached explicitly below before that run instead.
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: false

      # Cache the whole uv data dir, not just the tool venv: `uv tool install`
      # creates a venv that absolute-symlinks into the uv-managed Python under
      # ~/.local/share/uv/python. Caching only the tool dir would leave that
      # symlink dangling on a fresh runner (cache-hit skips reinstall), so
      # serena would fail to start. ~/.local/share/uv covers tools + python.
      - name: Restore Serena tool cache
        id: serena_cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.local/share/uv
            ~/.local/bin/serena
          key: serena-1.1.2-py3.13-h2 # gitleaks:allow -- tool cache key, not a secret

      # As with the Codex install: run outside the PR checkout, ignore uv config
      # files (uv.toml / pyproject.toml), and pin the index so a PR cannot
      # redirect uv to an attacker index and poison the fixed-key cache.
      - name: Install Serena
        if: steps.serena_cache.outputs.cache-hit != 'true'
        working-directory: ${{ runner.temp }}
        run: uv tool install --no-config --default-index https://pypi.org/simple -p 3.13 --force "serena-agent==1.1.2"

      - name: Add Serena to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Persist the freshly installed tools now, while they are still pristine:
      # after install but BEFORE both the untrusted `codex exec` AND any write
      # into the PR checkout below. Saving here (rather than in a post step, and
      # before the checkout write) means neither the no-sandbox Codex run nor a
      # PR-supplied symlink can get a tampered binary persisted under the key.
      - name: Save Codex CLI cache
        if: steps.codex_cli_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.codex-cli
          # -h2 suffix: bumped after the cache-hardening fixes so head never
          # restores an entry that an earlier, vulnerable run on this PR could
          # have poisoned under the old key.
          key: codex-cli-0.124.0-node24.15.0-h2 # gitleaks:allow -- tool cache key, not a secret

      - name: Save Serena tool cache
        if: steps.serena_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.local/share/uv
            ~/.local/bin/serena
          key: serena-1.1.2-py3.13-h2 # gitleaks:allow -- tool cache key, not a secret

      # cp --remove-destination unlinks the target first, so a PR that ships
      # .serena/project.yml as a symlink (e.g. into a cached tool path) cannot
      # have the copy follow it and write through. The caches are already saved
      # above, so this can no longer poison them regardless.
      - name: Restrict Serena for review
        env:
          TRUSTED_SERENA_PROJECT_PATH: ${{ runner.temp }}/trusted-serena-project.yml
        run: cp --remove-destination "$TRUSTED_SERENA_PROJECT_PATH" .serena/project.yml

      - name: Run Codex review
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          CODEX_OUTPUT_PATH: ${{ runner.temp }}/codex-pr-review.json
          CODEX_SCHEMA_PATH: ${{ runner.temp }}/trusted-codex-pr-review.schema.json
        run: |
          # GitHub Actions is the outer sandbox here. Avoid Codex's Linux bubblewrap
          # sandbox because hosted runners can intermittently reject loopback setup.
          codex exec \
            --cd "$GITHUB_WORKSPACE" \
            --dangerously-bypass-approvals-and-sandbox \
            --ignore-user-config \
            -c 'mcp_servers.serena.command="serena"' \
            -c 'mcp_servers.serena.args=["start-mcp-server","--project-from-cwd","--context=codex"]' \
            -c 'mcp_servers.serena.startup_timeout_sec=15' \
            -c service_tier=fast \
            --model gpt-5.5 \
            --output-schema "$CODEX_SCHEMA_PATH" \
            --output-last-message "$CODEX_OUTPUT_PATH" \
            - < "$RUNNER_TEMP/codex-pr-review.md"

      - name: Upload Codex review result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-pr-review-${{ needs.review-state.outputs.pr_number }}-${{ needs.review-state.outputs.head_sha }}
          path: ${{ runner.temp }}/codex-pr-review.json
          if-no-files-found: error
          retention-days: 1

  submit-codex-review:
    needs:
      - review-precheck
      - review-state
      - codex-review
    if: ${{ needs.codex-review.result == 'success' && needs.review-state.outputs.should_run == 'true' }}
    concurrency:
      group: codex-ai-review-${{ needs.review-precheck.outputs.pr_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Download Codex review result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codex-pr-review-${{ needs.review-state.outputs.pr_number }}-${{ needs.review-state.outputs.head_sha }}
          path: ${{ runner.temp }}

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CODEX_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODEX_REVIEW_APP_PRIVATE_KEY }}

      - name: Submit review to GitHub
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BOT_LOGIN: ${{ needs.review-state.outputs.bot_login }}
          CODEX_REVIEW_PATH: ${{ runner.temp }}/codex-pr-review.json
          PR_NUMBER: ${{ needs.review-state.outputs.pr_number }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const fs = require("fs");
            const review = JSON.parse(fs.readFileSync(process.env.CODEX_REVIEW_PATH, "utf8"));
            const pull_number = Number(process.env.PR_NUMBER);
            const parsePatch = (patch) => {
              const hunks = [];
              if (!patch) {
                return hunks;
              }

              const lines = patch.split("\n");
              let rightLine = null;
              let currentHunk = null;

              for (const line of lines) {
                const match = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (match) {
                  rightLine = Number(match[1]);
                  currentHunk = {
                    validRightLines: new Set(),
                  };
                  hunks.push(currentHunk);
                  continue;
                }

                if (rightLine === null || !currentHunk || line.startsWith("\\")) {
                  continue;
                }

                const prefix = line[0];
                if (prefix === "+" || prefix === " ") {
                  currentHunk.validRightLines.add(rightLine);
                  rightLine += 1;
                  continue;
                }

                if (prefix === "-") {
                  continue;
                }
              }

              return hunks;
            };

            const isValidCommentRange = (hunks, startLine, endLine) => {
              if (!Array.isArray(hunks) || hunks.length === 0 || !endLine) {
                return false;
              }

              const normalizedStart = startLine ? Math.min(startLine, endLine) : endLine;
              const normalizedEnd = startLine ? Math.max(startLine, endLine) : endLine;
              for (const hunk of hunks) {
                let valid = true;
                for (let line = normalizedStart; line <= normalizedEnd; line += 1) {
                  if (!hunk.validRightLines.has(line)) {
                    valid = false;
                    break;
                  }
                }

                if (valid) {
                  return true;
                }
              }

              return false;
            };

            const severityLabel = {
              high: "高",
              medium: "中",
              low: "低",
            };

            const findings = Array.isArray(review.findings) ? review.findings : [];
            const inlineComments = [];
            let nonInlineFindingsCount = 0;
            const validCommentLinesByPath = new Map();
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              per_page: 100,
            });
            for (const file of files) {
              validCommentLinesByPath.set(file.filename, parsePatch(file.patch));
            }
            const sections = [
              "<!-- codex-ai-review -->",
              "## Codex AIレビュー",
              "",
              review.summary.trim(),
            ];

            if (findings.length > 0) {
              sections.push("", "### 指摘事項", "");
              for (const finding of findings) {
                const hasRange = finding.start_line && finding.line && finding.start_line !== finding.line;
                const location = finding.line
                  ? hasRange
                    ? ` (${finding.file}:${finding.start_line}-${finding.line})`
                    : ` (${finding.file}:${finding.line})`
                  : ` (${finding.file})`;
                sections.push(
                  `- **[${severityLabel[finding.severity] ?? finding.severity}]** ${finding.title}${location}`,
                  `  ${finding.body}`
                );

                if (finding.file && finding.line) {
                  const fileHunks = validCommentLinesByPath.get(finding.file);
                  const normalizedStartLine = finding.start_line ? Math.min(finding.start_line, finding.line) : finding.line;
                  const normalizedEndLine = finding.start_line ? Math.max(finding.start_line, finding.line) : finding.line;

                  if (!isValidCommentRange(fileHunks, normalizedStartLine, normalizedEndLine)) {
                    nonInlineFindingsCount += 1;
                    continue;
                  }

                  const comment = {
                    path: finding.file,
                    body: `**[${severityLabel[finding.severity] ?? finding.severity}]** ${finding.title}\n\n${finding.body}`,
                    line: normalizedEndLine,
                    side: "RIGHT",
                  };

                  if (finding.start_line && normalizedStartLine !== normalizedEndLine) {
                    comment.start_line = normalizedStartLine;
                    comment.start_side = "RIGHT";
                  }

                  inlineComments.push(comment);
                  continue;
                }

                nonInlineFindingsCount += 1;
              }
            } else {
              sections.push("", "対応が必要な指摘はありませんでした。");
            }

            if (nonInlineFindingsCount > 0) {
              sections.push(
                "",
                `注: ${nonInlineFindingsCount} 件の指摘は行番号を特定できなかったため、inline comment ではなく本文にのみ記載しています。`
              );
              core.warning(
                `${nonInlineFindingsCount} findings could not be posted as inline comments for PR #${pull_number}.`
              );
            }

            const eventMap = {
              approve: "APPROVE",
              comment: "COMMENT",
              request_changes: "REQUEST_CHANGES",
            };

            const event = eventMap[review.decision] ?? "COMMENT";
            const reviewBody = sections.join("\n");
            const logReviewError = (error, contextMessage) => {
              const responseData = error?.response?.data;
              core.warning(`${contextMessage}: ${error.message}`);
              if (responseData) {
                core.warning(JSON.stringify(responseData));
              }
            };

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
                event,
                body: reviewBody,
                comments: inlineComments,
              });
            } catch (error) {
              if (error.status !== 422 || inlineComments.length === 0) {
                logReviewError(error, `Failed to submit review for PR #${pull_number}`);
                throw error;
              }

              logReviewError(
                error,
                `Failed to submit inline review comments for PR #${pull_number}; retrying without inline comments`
              );
              core.warning(
                `${inlineComments.length} inline comments could not be posted for PR #${pull_number}. Posting review body only.`
              );
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
                event,
                body: `${reviewBody}\n\n注: inline comment の投稿に失敗したため、指摘は本文にのみ記載しています。`,
              });
            }

            const botLogin = process.env.BOT_LOGIN;

            const resolutions = Array.isArray(review.resolutions) ? review.resolutions : [];
            if (resolutions.length > 0) {
              const resolutionMarker = "<!-- codex-ai-review-resolution -->";

              // Re-fetch the current review threads so we only act on threads that
              // really exist on this PR, are still unresolved, and were opened by the
              // Codex bot. Codex only supplies thread node IDs + reasons; never trust
              // them blindly.
              const threadsById = new Map();
              let resolutionCursor = null;
              let hasMoreThreads = true;
              while (hasMoreThreads) {
                const response = await github.graphql(
                  `
                    query($owner: String!, $repo: String!, $pullNumber: Int!, $after: String) {
                      repository(owner: $owner, name: $repo) {
                        pullRequest(number: $pullNumber) {
                          reviewThreads(first: 100, after: $after) {
                            nodes {
                              id
                              isResolved
                              comments(first: 1) {
                                nodes {
                                  author {
                                    login
                                  }
                                }
                              }
                            }
                            pageInfo {
                              hasNextPage
                              endCursor
                            }
                          }
                        }
                      }
                    }
                  `,
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pullNumber: pull_number,
                    after: resolutionCursor,
                  }
                );
                const connection = response.repository.pullRequest.reviewThreads;
                for (const thread of connection.nodes || []) {
                  threadsById.set(thread.id, {
                    isResolved: Boolean(thread.isResolved),
                    rootAuthor: thread.comments?.nodes?.[0]?.author?.login ?? null,
                  });
                }
                hasMoreThreads = Boolean(connection.pageInfo?.hasNextPage);
                resolutionCursor = connection.pageInfo?.endCursor ?? null;
              }

              const seenThreadIds = new Set();
              for (const resolution of resolutions) {
                const threadId = typeof resolution?.thread_id === "string" ? resolution.thread_id.trim() : "";
                const reason = typeof resolution?.reason === "string" ? resolution.reason.trim() : "";
                if (!threadId || !reason) {
                  continue;
                }
                if (seenThreadIds.has(threadId)) {
                  continue;
                }
                seenThreadIds.add(threadId);

                const thread = threadsById.get(threadId);
                if (!thread) {
                  core.warning(`Skipping resolution for unknown thread ${threadId} on PR #${pull_number}.`);
                  continue;
                }
                if (thread.isResolved) {
                  continue;
                }
                if (botLogin && thread.rootAuthor !== botLogin) {
                  core.warning(`Skipping resolution for thread ${threadId} not opened by ${botLogin}.`);
                  continue;
                }

                const replyBody = [
                  resolutionMarker,
                  reason,
                  "",
                  "_今回の差分で解消されたと判断したため、Codex AI レビューがこの会話を自動で resolved にしました。_",
                ].join("\n");

                try {
                  await github.graphql(
                    `
                      mutation($threadId: ID!, $body: String!) {
                        addPullRequestReviewThreadReply(input: { pullRequestReviewThreadId: $threadId, body: $body }) {
                          comment {
                            id
                          }
                        }
                      }
                    `,
                    { threadId, body: replyBody }
                  );
                  await github.graphql(
                    `
                      mutation($threadId: ID!) {
                        resolveReviewThread(input: { threadId: $threadId }) {
                          thread {
                            id
                            isResolved
                          }
                        }
                      }
                    `,
                    { threadId }
                  );
                } catch (error) {
                  core.warning(`Failed to resolve thread ${threadId} on PR #${pull_number}: ${error.message}`);
                }
              }
            }

            if (botLogin) {
              const reactions = await github.paginate("GET /repos/{owner}/{repo}/issues/{issue_number}/reactions", {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull_number,
                per_page: 100,
                headers: {
                  accept: "application/vnd.github+json",
                },
              });

              for (const reaction of reactions) {
                if (reaction.content === "eyes" && reaction.user?.login === botLogin) {
                  await github.request("DELETE /repos/{owner}/{repo}/issues/{issue_number}/reactions/{reaction_id}", {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pull_number,
                    reaction_id: reaction.id,
                    headers: {
                      accept: "application/vnd.github+json",
                    },
                  });
                }
              }
            }
