name: Terraform CI

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - changes
      - discover-terraform-roots
      - terraform-lint
      - terraform-trivy
      - terraform-checkov
      - terraform-tfsec
      # - pluralith
      - infracost
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check terraform-status-check
        run: |
          diff \
            <(yq ".jobs | del(.terraform-status-check) | keys.[]" .github/workflows/terraform.yml | sort) \
            <(yq ".jobs.terraform-status-check.needs.[]" .github/workflows/terraform.yml | sort)
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done

  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - "terraform/**"
              - ".github/workflows/**"

  discover-terraform-roots:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Discover terraform roots
        id: discover
        uses: ./.github/actions/discover-terraform-roots

  terraform-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: discover-terraform-roots
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-terraform-roots.outputs.matrix) }}
    name: terraform-lint (${{ matrix.target.path }})
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Get Terraform version from mise.toml
        id: terraform-version
        run: |
          if grep -q 'terraform = "latest"' mise.toml; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            version=$(grep 'terraform = ' mise.toml | sed 's/.*terraform = "\(.*\)".*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}
          terraform_wrapper: false
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: latest
      - name: Setup Go for local TrueNAS provider
        if: matrix.target.path == 'terraform/truenas'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Build local TrueNAS provider mirror
        if: matrix.target.path == 'terraform/truenas'
        run: |
          set -euo pipefail
          provider_version="0.0.1"
          provider_host="registry.terraform.io"
          provider_namespace="shiron-dev"
          provider_type="truenas"
          provider_os="$(go env GOOS)"
          provider_arch="$(go env GOARCH)"
          mirror_dir="${GITHUB_WORKSPACE}/.local/terraform-provider-mirror"
          package_dir="${mirror_dir}/${provider_host}/${provider_namespace}/${provider_type}/${provider_version}/${provider_os}_${provider_arch}"
          devrc="${GITHUB_WORKSPACE}/.local/terraform-provider-truenas.tfrc"

          (cd terraform/provider && go build -o terraform-provider-truenas .)
          mkdir -p "${package_dir}" "$(dirname "${devrc}")"
          cp terraform/provider/terraform-provider-truenas "${package_dir}/terraform-provider-${provider_type}_v${provider_version}"
          cat > "${devrc}" <<EOF
          provider_installation {
            filesystem_mirror {
              path = "${mirror_dir}"
              include = ["${provider_host}/${provider_namespace}/${provider_type}"]
            }

            direct {
              exclude = ["${provider_host}/${provider_namespace}/${provider_type}"]
            }
          }
          EOF
      - name: Terraform Format Check
        run: |
          cd "${{ matrix.target.path }}"
          terraform fmt -check -recursive
      - name: Terraform Init
        run: |
          cd "${{ matrix.target.path }}"
          if [[ "${{ matrix.target.path }}" == "terraform/truenas" ]]; then
            if [[ -f .terraform.lock.hcl ]]; then
              mv .terraform.lock.hcl .terraform.lock.hcl.ci-disabled
            fi
            TF_CLI_CONFIG_FILE="${GITHUB_WORKSPACE}/.local/terraform-provider-truenas.tfrc" terraform init -backend=false
          else
            terraform init -backend=false
          fi
      - name: Terraform Validate
        run: |
          cd "${{ matrix.target.path }}"
          if [[ "${{ matrix.target.path }}" == "terraform/truenas" ]]; then
            TF_CLI_CONFIG_FILE="${GITHUB_WORKSPACE}/.local/terraform-provider-truenas.tfrc" terraform validate
          else
            terraform validate
          fi
      - name: TFLint
        run: |
          cd "${{ matrix.target.path }}"
          if [[ "${{ matrix.target.path }}" == "terraform/truenas" ]]; then
            TF_CLI_CONFIG_FILE="${GITHUB_WORKSPACE}/.local/terraform-provider-truenas.tfrc" tflint
          else
            tflint
          fi

  terraform-trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: discover-terraform-roots
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-terraform-roots.outputs.matrix) }}
    name: terraform-trivy (${{ matrix.target.path }})
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: ${{ matrix.target.path }}

  terraform-checkov:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@dfb51aed1b783289b0d3f255028e7a88d5e8caa1 # v12.3105.0
        with:
          directory: terraform/
          framework: terraform
          compact: true
          quiet: false

  terraform-tfsec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run tfsec-compatible scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: terraform/

