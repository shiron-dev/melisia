name: Terraform CI

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  discover-terraform-roots:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Discover terraform roots
        id: discover
        uses: ./.github/actions/discover-terraform-roots

  terraform-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - discover-terraform-roots
      - terraform-lint
      - terraform-trivy
      - terraform-checkov
      - terraform-tfsec
      - pluralith
      - infracost
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check terraform-status-check
        run: |
          diff \
            <(yq ".jobs | del(.terraform-status-check) | keys.[]" .github/workflows/terraform.yml | sort) \
            <(yq ".jobs.terraform-status-check.needs.[]" .github/workflows/terraform.yml | sort)
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done

  terraform-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: discover-terraform-roots
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-terraform-roots.outputs.matrix) }}
    name: terraform-lint (${{ matrix.target.path }})
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get Terraform version from mise.toml
        id: terraform-version
        run: |
          if grep -q 'terraform = "latest"' mise.toml; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            version=$(grep 'terraform = ' mise.toml | sed 's/.*terraform = "\(.*\)".*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@4cb9feea73331a35b422df102992a03a44a3bb33 # v6.2.1
        with:
          tflint_version: latest
      - name: Terraform Format Check
        run: |
          cd "${{ matrix.target.path }}"
          terraform fmt -check -recursive
      - name: Terraform Init
        run: |
          cd "${{ matrix.target.path }}"
          terraform init -backend=false
      - name: Terraform Validate
        run: |
          cd "${{ matrix.target.path }}"
          terraform validate
      - name: TFLint
        run: |
          cd "${{ matrix.target.path }}"
          tflint

  terraform-trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: discover-terraform-roots
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-terraform-roots.outputs.matrix) }}
    name: terraform-trivy (${{ matrix.target.path }})
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'config'
          scan-ref: ${{ matrix.target.path }}

  terraform-checkov:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@f9b0a2206b0401cad02ac0a66be2a7934a5be838 # v12
        with:
          directory: terraform/
          framework: terraform
          compact: true
          quiet: false

  terraform-tfsec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: terraform/

  pluralith:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get Terraform version from mise.toml
        id: terraform-version
        run: |
          if grep -q 'terraform = "latest"' mise.toml; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            version=$(grep 'terraform = ' mise.toml | sed 's/.*terraform = "\(.*\)".*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}
      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend=false
      - name: Run Pluralith
        uses: pluralith/github-action@d1a8e3c3a4b9e5f7c9e1b3a5d7f9e1a3c5e7f9a1 # v2
        with:
          terraform_directory: terraform/

  infracost:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get Terraform version from mise.toml
        id: terraform-version
        run: |
          if grep -q 'terraform = "latest"' mise.toml; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            version=$(grep 'terraform = ' mise.toml | sed 's/.*terraform = "\(.*\)".*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}
      - name: Setup Infracost
        uses: infracost/actions/setup@e9d6e6cd65e168e76b0de50ff9957d2fe8bb1832 # v3.0.1
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      - name: Generate Infracost cost estimate baseline
        run: |
          infracost breakdown --path=terraform/terraform \
            --format=json \
            --out-file=/tmp/infracost-base.json
      - name: Generate Infracost diff
        run: |
          infracost diff --path=terraform/terraform \
            --format=json \
            --out-file=/tmp/infracost.json \
            --compare-to=/tmp/infracost-base.json
      - name: Post Infracost comment
        run: |
          infracost comment github --path=/tmp/infracost.json \
            --repo="$GITHUB_REPOSITORY" \
            --github-token=${{github.token}} \
            --pull-request=${{github.event.pull_request.number}} \
            --behavior=update
        if: github.event_name == 'pull_request'
