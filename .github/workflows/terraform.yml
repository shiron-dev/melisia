  #   timeout-minutes: 10
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  #     - name: Get Terraform version from mise.toml
  #       id: terraform-version
  #       run: |
  #         if grep -q 'terraform = "latest"' mise.toml; then
  #           echo "version=latest" >> "$GITHUB_OUTPUT"
  #         else
  #           version=$(grep 'terraform = ' mise.toml | sed 's/.*terraform = "\(.*\)".*/\1/')
  #           echo "version=$version" >> "$GITHUB_OUTPUT"
  #         fi
  #     - name: Setup Terraform
  #       uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
  #       with:
  #         terraform_version: ${{ steps.terraform-version.outputs.version }}
  #     - name: Terraform Init
  #       run: |
  #         cd terraform
  #         terraform init -backend=false
  #     - name: Run Pluralith
  #       uses: pluralith/github-action@d1a8e3c3a4b9e5f7c9e1b3a5d7f9e1a3c5e7f9a1 # v2
  #       with:
  #         terraform_directory: terraform/

  infracost:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
      - name: Setup Infracost
        uses: infracost/actions/setup@d51fc54d23c9ad90f984b884257bd96dc2625067 # v4.1.0
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      - name: Generate Infracost cost estimate baseline
        run: |
          infracost breakdown --path=terraform/terraform \
            --format=json \
            --out-file=/tmp/infracost-base.json
      - name: Generate Infracost diff
        run: |
          infracost diff --path=terraform/terraform \
            --format=json \
            --out-file=/tmp/infracost.json \
            --compare-to=/tmp/infracost-base.json
      - name: Post Infracost comment
        run: |
          infracost comment github --path=/tmp/infracost.json \
            --repo="$GITHUB_REPOSITORY" \
            --github-token=${{github.token}} \
            --pull-request=${{github.event.pull_request.number}} \
            --behavior=update
        if: github.event_name == 'pull_request'
