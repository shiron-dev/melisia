name: Terraform CI

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terraform-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - changes
      - discover-terraform-roots
      - terraform-lint
      - terraform-trivy
      - terraform-checkov
      - terraform-tfsec
      # - pluralith
      - infracost
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check terraform-status-check
        run: |
          diff \
            <(yq ".jobs | del(.terraform-status-check) | keys.[]" .github/workflows/terraform.yml | sort) \
            <(yq ".jobs.terraform-status-check.needs.[]" .github/workflows/terraform.yml | sort)
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - "terraform/**"
              - ".github/workflows/**"

  discover-terraform-roots:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Discover terraform roots
        id: discover
        uses: ./.github/actions/discover-terraform-roots

  terraform-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: discover-terraform-roots
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-terraform-roots.outputs.matrix) }}
    name: terraform-lint (${{ matrix.target.path }})
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
      - name: Get TFLint version from mise.toml
        id: tflint-version
        run: |
          if grep -q 'tflint = "latest"' mise.toml; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            version=$(grep 'tflint = ' mise.toml | sed 's/.*tflint = "\(.*\)".*/\1/')
            echo "version=v$version" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: ${{ steps.tflint-version.outputs.version }}
      - name: Setup Go for local TrueNAS provider
        if: matrix.target.path == 'terraform/truenas'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Build local TrueNAS provider mirror
        id: provider-mirror
        if: matrix.target.path == 'terraform/truenas'
        uses: ./.github/actions/build-truenas-provider-mirror
      - name: Terraform Format Check
        run: |
          cd "${{ matrix.target.path }}"
          terraform fmt -check -recursive
      - name: Terraform Init
        run: |
          cd "${{ matrix.target.path }}"
          if [[ "${{ matrix.target.path }}" == "terraform/truenas" ]]; then
            if [[ -f .terraform.lock.hcl ]]; then
              mv .terraform.lock.hcl .terraform.lock.hcl.ci-disabled
            fi
            TF_CLI_CONFIG_FILE="${{ steps.provider-mirror.outputs.tfrc-path }}" terraform init -backend=false
          else
            terraform init -backend=false
          fi
      - name: Terraform Validate
        run: |
          cd "${{ matrix.target.path }}"
          if [[ "${{ matrix.target.path }}" == "terraform/truenas" ]]; then
            TF_CLI_CONFIG_FILE="${{ steps.provider-mirror.outputs.tfrc-path }}" terraform validate
          else
            terraform validate
          fi
      - name: TFLint
        run: |
          cd "${{ matrix.target.path }}"
          if [[ "${{ matrix.target.path }}" == "terraform/truenas" ]]; then
            TF_CLI_CONFIG_FILE="${{ steps.provider-mirror.outputs.tfrc-path }}" tflint
          else
            tflint
          fi

  # A single full-tree scan instead of one matrix job per root: Trivy needs no
  # Terraform setup, so per-root fan-out only multiplies runner startup + DB pulls.
  terraform-trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: terraform/

  terraform-checkov:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@063da70420ab562cb31f661b374a76b6a42ed6b5 # v12.3108.0
        with:
          directory: terraform/
          framework: terraform
          compact: true
          quiet: false

  terraform-tfsec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run tfsec-compatible scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: terraform/

