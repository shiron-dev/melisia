name: TrueNAS Provider CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/truenas-provider.yml"
      - "terraform/provider/**"
      - "terraform/truenas/provider.tf"
      - "terraform/truenas/variables.tf"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  go-fmt:
    name: Go fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform/provider
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Check gofmt
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "${unformatted}"
            exit 1
          fi

  go-vet:
    name: Go vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform/provider
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Run go vet
        run: go vet ./...

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform/provider
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Run go test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

  build:
    name: Build provider
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform/provider
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Build provider
        run: go build -o terraform-provider-truenas .

  terraform-validate:
    name: Terraform validate with local provider
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Get Terraform version from mise.toml
        id: terraform-version
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^terraform[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' mise.toml | head -n1)"
          if [[ -z "${version}" ]]; then
            echo "Failed to read Terraform version from mise.toml"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}
          terraform_wrapper: false
      - name: Build local provider mirror
        run: |
          set -euo pipefail
          provider_version="0.0.1"
          provider_host="registry.terraform.io"
          provider_namespace="shiron-dev"
          provider_type="truenas"
          provider_os="$(go env GOOS)"
          provider_arch="$(go env GOARCH)"
          mirror_dir="${GITHUB_WORKSPACE}/.local/terraform-provider-mirror"
          package_dir="${mirror_dir}/${provider_host}/${provider_namespace}/${provider_type}/${provider_version}/${provider_os}_${provider_arch}"
          devrc="${GITHUB_WORKSPACE}/.local/terraform-provider-truenas.tfrc"

          (cd terraform/provider && go build -o terraform-provider-truenas .)
          mkdir -p "${package_dir}" "$(dirname "${devrc}")"
          cp terraform/provider/terraform-provider-truenas "${package_dir}/terraform-provider-${provider_type}_v${provider_version}"
          cat > "${devrc}" <<EOF
          provider_installation {
            filesystem_mirror {
              path = "${mirror_dir}"
              include = ["${provider_host}/${provider_namespace}/${provider_type}"]
            }

            direct {
              exclude = ["${provider_host}/${provider_namespace}/${provider_type}"]
            }
          }
          EOF
      - name: Prepare temporary terraform root
        id: temp-root
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d "${RUNNER_TEMP}/truenas-terraform.XXXXXX")"
          cp terraform/truenas/*.tf "${tmpdir}/"
          perl -0pi -e 's/\n  backend "gcs" \{.*?\n  \}//s' "${tmpdir}/provider.tf"
          echo "path=${tmpdir}" >> "$GITHUB_OUTPUT"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/truenas terraform/provider
      - name: Terraform init
        env:
          TF_CLI_CONFIG_FILE: ${{ github.workspace }}/.local/terraform-provider-truenas.tfrc
        run: terraform -chdir="${{ steps.temp-root.outputs.path }}" init -backend=false -reconfigure
      - name: Terraform validate
        env:
          TF_CLI_CONFIG_FILE: ${{ github.workspace }}/.local/terraform-provider-truenas.tfrc
        run: terraform -chdir="${{ steps.temp-root.outputs.path }}" validate
