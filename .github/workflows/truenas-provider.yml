name: TrueNAS Provider CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/truenas-provider.yml"
      - "terraform/provider/**"
      - "terraform/truenas/provider.tf"
      - "terraform/truenas/variables.tf"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # Fast Go static checks share one setup-go + Go build cache (compiles once).
  # go-test (-race) and terraform-validate stay in their own parallel jobs.
  go-checks:
    name: Go checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform/provider
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Check gofmt
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "${unformatted}"
            exit 1
          fi
      - name: Run go vet
        run: go vet ./...
      - name: Build provider
        run: go build -o terraform-provider-truenas .

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform/provider
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Run go test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

  terraform-validate:
    name: Terraform validate with local provider
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: terraform/provider/go.mod
          cache-dependency-path: terraform/provider/go.sum
      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
      - name: Build local provider mirror
        id: provider-mirror
        uses: ./.github/actions/build-truenas-provider-mirror
      - name: Prepare temporary terraform root
        id: temp-root
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d "${RUNNER_TEMP}/truenas-terraform.XXXXXX")"
          cp terraform/truenas/*.tf "${tmpdir}/"
          perl -0pi -e 's/\n  backend "gcs" \{.*?\n  \}//s' "${tmpdir}/provider.tf"
          echo "path=${tmpdir}" >> "$GITHUB_OUTPUT"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/truenas terraform/provider
      - name: Terraform init
        env:
          TF_CLI_CONFIG_FILE: ${{ steps.provider-mirror.outputs.tfrc-path }}
        run: terraform -chdir="${{ steps.temp-root.outputs.path }}" init -backend=false -reconfigure
      - name: Terraform validate
        env:
          TF_CLI_CONFIG_FILE: ${{ steps.provider-mirror.outputs.tfrc-path }}
        run: terraform -chdir="${{ steps.temp-root.outputs.path }}" validate
