name: photoframe image

on:
  push:
    branches:
      - main
    paths:
      - "apps/photoframe/**"
      - ".github/workflows/photoframe-image.yml"
    tags:
      - "photoframe-v*"
  pull_request:
    paths:
      - "apps/photoframe/**"
      - ".github/workflows/photoframe-image.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/photoframe

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # On pull_request the full suite (vet/test/lint) runs in photoframe.yml, so
      # skip it here to avoid duplication. On the publish path (push to main and
      # photoframe-v* tags) photoframe.yml does not run, so gate the image on a
      # vet + test pass before building/pushing.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        if: github.event_name != 'pull_request'
        with:
          go-version-file: apps/photoframe/go.mod
          cache: false

      - name: Test
        if: github.event_name != 'pull_request'
        working-directory: apps/photoframe
        run: |
          go vet ./...
          go test ./...

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        # Skip on pull_request: the token cannot push and login is unnecessary.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=match,pattern=photoframe-v(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/photoframe
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
