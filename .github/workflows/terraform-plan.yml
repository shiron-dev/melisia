name: Terraform Plan CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - "terraform/**"
              - ".github/workflows/**"

  discover-terraform-roots:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Discover terraform roots
        id: discover
        uses: ./.github/actions/discover-terraform-roots

  plan:
    name: terraform plan (${{ matrix.target.path }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-plan
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.should_run == 'true' }}
    needs:
      - changes
      - discover-terraform-roots
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-terraform-roots.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      TERRAFORM_PLAN_SKIP_TARGETS: "terraform/github_secrets"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get Terraform version from mise.toml
        id: terraform-version
        run: |
          if grep -q 'terraform = "latest"' mise.toml; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            version=$(grep 'terraform = ' mise.toml | sed 's/.*terraform = "\(.*\)".*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - name: Install SOPS
        run: |
          set -euo pipefail
          SOPS_VERSION="v3.9.4"
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops
          sops --version
      - name: Decrypt secrets
        run: make sops-decrypt
      - name: Terraform Init
        run: cd "${{ matrix.target.path }}" && terraform init -reconfigure
      - name: Run terraform plan
        id: terraform-plan
        run: |
          set +e

          if echo ",${TERRAFORM_PLAN_SKIP_TARGETS}," | grep -Fq ",${{ matrix.target.path }},"; then
            echo "Skipping terraform plan for ${{ matrix.target.path }} in PR CI: target is listed in TERRAFORM_PLAN_SKIP_TARGETS."
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tfvars_path="$GITHUB_WORKSPACE/${{ matrix.target.path }}/terraform.secrets.tfvars"
          plan_args=("-no-color" "-detailed-exitcode")
          if [ -f "$tfvars_path" ]; then
            plan_args+=("-var-file=$tfvars_path")
          fi

          cd "${{ matrix.target.path }}" && terraform plan "${plan_args[@]}" > "$GITHUB_WORKSPACE/plan_output_${{ matrix.target.id }}.txt" 2>&1
          exit_code=$?

          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
      - name: Upload plan to Slack
        id: slack-upload
        if: steps.terraform-plan.outputs.exit_code != '0' && steps.terraform-plan.outputs.exit_code != ''
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel_id: ${{ secrets.SLACK_PLAN_CHANNEL_ID }}
            snippet_type: text
            title: "Terraform Plan (${{ matrix.target.path }}) - PR #${{ github.event.number }}"
            filename: terraform-plan-${{ matrix.target.id }}-${{ github.run_id }}.txt
            initial_comment: |
              Terraform plan result for PR #${{ github.event.number }}: ${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.number }}
              Target: ${{ matrix.target.path }}
            file: ${{ github.workspace }}/plan_output_${{ matrix.target.id }}.txt
      - name: Extract Slack permalink
        id: slack-link
        if: steps.slack-upload.outcome == 'success'
        env:
          SLACK_RESPONSE: ${{ steps.slack-upload.outputs.response-payload }}
        run: |
          permalink=$(jq -r '(.files[0].permalink // empty)' <<< "$SLACK_RESPONSE" 2>/dev/null || true)
          echo "url=${permalink}" >> "$GITHUB_OUTPUT"
      - name: Prepare comment body
        id: prepare-comment
        env:
          PLAN_EXIT_CODE: ${{ steps.terraform-plan.outputs.exit_code }}
          SLACK_URL: ${{ steps.slack-link.outputs.url }}
        run: |
          comment_file="$GITHUB_WORKSPACE/comment_body_${{ matrix.target.id }}.md"
          if [ "$PLAN_EXIT_CODE" = "0" ]; then
            {
              echo "### \`terraform plan\` result (${{ matrix.target.path }})"
              echo ""
              echo "No changes."
            } > "$comment_file"
          elif [ "$PLAN_EXIT_CODE" = "2" ]; then
            {
              echo "### \`terraform plan\` result (${{ matrix.target.path }})"
              echo ""
              echo ":warning: Changes detected."
              if [ -n "$SLACK_URL" ]; then
                echo ""
                echo "Plan details: [View in Slack]($SLACK_URL)"
              else
                echo ""
                echo "Plan details have been posted to the Slack plan channel."
              fi
            } > "$comment_file"
          else
            {
              echo "### \`terraform plan\` result (${{ matrix.target.path }})"
              echo ""
              echo ":x: Plan failed (exit code: $PLAN_EXIT_CODE)."
              if [ -n "$SLACK_URL" ]; then
                echo ""
                echo "Details: [View in Slack]($SLACK_URL)"
              else
                echo ""
                echo "Details have been posted to the Slack plan channel."
              fi
            } > "$comment_file"
          fi
          echo "path=${comment_file}" >> "$GITHUB_OUTPUT"
      - name: Comment terraform plan result
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: terraform-plan-${{ matrix.target.id }}
          path: ${{ steps.prepare-comment.outputs.path }}
      - name: Fail when terraform plan failed
        if: steps.terraform-plan.outputs.exit_code == '1'
        run: exit 1

  terraform-plan-status-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ always() }}
    needs:
      - changes
      - discover-terraform-roots
      - plan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check terraform-plan-status-check
        run: |
          diff \
            <(yq '.jobs | del(.terraform-plan-status-check) | keys.[]' .github/workflows/terraform-plan.yml) \
            <(yq '.jobs.terraform-plan-status-check.needs.[]' .github/workflows/terraform-plan.yml)
      - name: Fail if any needed job failed
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          for result in $(jq -r '.[].result' <<<"$JOBS"); do
            if [[ ! "$result" =~ ^(success|skipped)$ ]]; then
              exit 1
            fi
          done
