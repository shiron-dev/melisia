name: Terraform Plan CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  discover-terraform-roots:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Discover terraform roots
        id: discover
        uses: ./.github/actions/discover-terraform-roots

  plan:
    name: terraform plan (${{ matrix.target.path }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-plan
    if: github.event_name == 'pull_request'
    needs: discover-terraform-roots
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-terraform-roots.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get Terraform version from mise.toml
        id: terraform-version
        run: |
          if grep -q 'terraform = "latest"' mise.toml; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            version=$(grep 'terraform = ' mise.toml | sed 's/.*terraform = "\(.*\)".*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - name: Install SOPS
        run: |
          set -euo pipefail
          SOPS_VERSION="v3.9.4"
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops
          sops --version
      - name: Decrypt secrets
        run: make sops-decrypt
      - name: Terraform Init
        run: cd "${{ matrix.target.path }}" && terraform init
      - name: Run terraform plan
        id: terraform-plan
        run: |
          set +e

          output_file="$(mktemp)"
          tfvars_path="$GITHUB_WORKSPACE/${{ matrix.target.path }}/terraform.secrets.tfvars"
          plan_args=("-no-color" "-detailed-exitcode")
          if [ -f "$tfvars_path" ]; then
            plan_args+=("-var-file=$tfvars_path")
          fi

          cd "${{ matrix.target.path }}" && terraform plan "${plan_args[@]}" 2>&1 | tee "$output_file"
          exit_code="${PIPESTATUS[0]}"

          {
            echo "output<<EOF"
            cat "$output_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          cp "$output_file" "$GITHUB_WORKSPACE/plan_output_${{ matrix.target.id }}.txt"
          rm -f "$output_file"
      - name: Prepare comment body
        id: prepare-comment
        env:
          PLAN_EXIT_CODE: ${{ steps.terraform-plan.outputs.exit_code }}
        run: |
          comment_file="$GITHUB_WORKSPACE/comment_body_${{ matrix.target.id }}.md"
          if [ "$PLAN_EXIT_CODE" = "0" ]; then
            {
              echo "### \`terraform plan\` result (${{ matrix.target.path }})"
              echo ""
              echo "No changes."
            } > "$comment_file"
          else
            {
              echo "### \`terraform plan\` result (${{ matrix.target.path }})"
              echo ""
              echo "\`\`\`diff"
              cat "$GITHUB_WORKSPACE/plan_output_${{ matrix.target.id }}.txt"
              echo "\`\`\`"
            } > "$comment_file"
          fi
          echo "path=${comment_file}" >> "$GITHUB_OUTPUT"
      - name: Comment terraform plan result
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: terraform-plan-${{ matrix.target.id }}
          path: ${{ steps.prepare-comment.outputs.path }}
      - name: Fail when terraform plan failed
        if: steps.terraform-plan.outputs.exit_code == '1'
        run: exit 1
