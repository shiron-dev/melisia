# Falco の kmod ドライバを実機でビルドするために、現行カーネルに一致する
# ヘッダを保証する。modern eBPF 非対応の Pi カーネルでは kmod が唯一の
# ドライバ方式のため必須 (compose/projects/falco-kmod を参照)。
# メタパッケージ linux-headers-rpi-2712 が現行カーネル用ヘッダを引き込み、
# /lib/modules/<ver>/build symlink を提供する。
- name: Install kernel headers for Falco kmod driver build
  become: true
  ansible.builtin.apt:
    name: linux-headers-rpi-2712
    state: present
    update_cache: true
