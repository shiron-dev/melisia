- name: Swap off
  ansible.builtin.import_tasks: swap.yml
- name: Use tmpfs
  ansible.builtin.import_tasks: tmpfs.yml
- name: Install rsyslog
  ansible.builtin.import_tasks: rsyslog.yml
- name: Configure journald
  ansible.builtin.import_tasks: journald.yml
- name: Configure Wi-Fi fallback
  ansible.builtin.import_tasks: wifi.yml
- name: Install kernel headers (Falco kmod driver)
  ansible.builtin.import_tasks: kernel_headers.yml
- name: Build and load the Falco kernel module (host-side dkms)
  ansible.builtin.import_tasks: falco_driver.yml

- name: Generate en_US.UTF-8 locale
  become: true
  community.general.locale_gen:
    name: en_US.UTF-8
    state: present

- name: Set locale
  become: true
  ansible.builtin.lineinfile:
    path: /etc/locale.conf
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    create: true
    mode: "0644"
  loop:
    - { key: LANG, value: en_US.UTF-8 }
    - { key: LC_ALL, value: en_US.UTF-8 }
