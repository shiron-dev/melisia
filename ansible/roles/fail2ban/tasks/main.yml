- name: Apt-get update
  become: true
  ansible.builtin.apt:
    update_cache: true

- name: Install fail2ban
  become: true
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Make jail.local
  become: true
  ansible.builtin.template:
    src: jail.local.secrets.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban

- name: Enable fail2ban
  become: true
  ansible.builtin.service:
    name: fail2ban
    enabled: true
