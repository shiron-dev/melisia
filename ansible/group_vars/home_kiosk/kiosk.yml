kiosk_mqtt_host: 192.168.1.61
kiosk_mqtt_port: 1884
kiosk_output: HDMI-A-2
kiosk_cdp_port: 9222
kiosk_idle_timeout: 1
kiosk_slots: 6

# Seed playlist (URL + display seconds). After first deploy, edit per slot from
# Home Assistant; edits persist in /var/lib/kiosk/state.json and are not
# overwritten by re-running the role.
kiosk_default_playlist:
  - { url: "https://example.com/dashboard1", seconds: 30 }
  - { url: "https://example.com/dashboard2", seconds: 60 }
