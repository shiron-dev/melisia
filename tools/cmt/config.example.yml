# cmt (Compose Manage Tool) configuration
#
# JSON Schema: run `cmt schema cmt` to generate

basePath: ../compose   # relative to this config file's directory

defaults:
  remotePath: /opt/compose       # plan/apply create a per-project lock at <remotePath>/<project>/.cmt.lock
  composeAction: up              # up|down|ignore (default: up)

hosts:
  - name: server1
    host: 192.168.1.10
    user: deploy
    # sshKeyPath: ~/.ssh/id_ed25519   # omit to use the SSH agent (SSH_AUTH_SOCK)

  - name: server2
    host: 192.168.1.11
    port: 2222
    user: deploy
    sshKeyPath: ~/.ssh/id_ed25519

